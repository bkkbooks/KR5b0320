front:
  text: 赤松子章曆卷之五
  hash: sha256:d6c144f2292c28d39ddde2d891b916935521ef13ba2aea8d199b9f8674da68e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0320_HFL_005-001a, image: hfl/0336/0336-056.png}
body:
  text: 爲天地神祇言功章具法位上言謹按文書某州縣郷思觀道士某等素以胎生叨賜天官治籙内外重沓過泰之恩臣以下愚六情奔蕩不自覺知歲月滋深積罪無數難可安全仰頼身中所受神仙寳籙所見營護受恩隆重伏地拜章一通上聞特從太上無極大道諸君丈人天師君夫人造化之恩赦臣等宿世今生千罪萬過及臣前後爲百姓男女消災救疾吾急章奏建立齋直施行功德口啓願諸所求乞上請天官役使吏兵及天地水三官前後水陸行諸道逕州縣郷亭里域諸官君正炁助道興化者從正月十月巳來天官吏兵有功勞者悉乞爲言功遷加爵秩從一等至百等從百等至千等如天曹科品録署便曹穩職無令失意有恨者天宫地官水官受功事訖各還本位并從正月至十二月所請君將吏兵今爲言功月一日至三十日所請君將吏兵今爲言功日子時至亥時所請君將吏兵今爲言功盡爲舉遷依天曹科品皆無令恚恨符契吏兵及時伏臣等身中保守如故伏願太上無極大道諸君丈人天師君夫人降下正一生炁覆蓋臣某身生氣眞全宿疾除愈四體輕强三尸墮落九蟲沈零學道棲神心開意悟曉知未來長生乆視神仙度世得見太平願臣生縁家口大小等身並乞災厄過度年命延永五瘟疫毒不敢侵斥至來年某月某日安穩如願當爲衆官拜奏言功不負效信恩惟太上分别求哀臣愚劣謹因二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏官各二人出操臣某因三㑹吉慶爲天地神祇及臣等身中吏兵爲前後百姓同詣救治疾厄求乞恩福臣等拜上都言功口章一通上詣三天曹伏須告報臣某誠惶誠恐稽首頓首再拜以聞空三行臣某屬某宫焚修空三行空三行年號歳次某甲某月某朔某甲子某時章於某處齋壇拜上空三行可漏用全紙一幅爲之太清玄九無上三天無極大道太清金闕七寳玉陛下具章奏法佐臣姓某上奏謹封内方函謹謹上詣太上虚無文人宮具章治某宮具章奏法位姓某謹重封方函謹謹上詣具章奏法位姓某謹重封三天門下請進三五言功章具法位上言謹按文書臣等芻草之𩔖生於濁俗仰藉宿慶遭逢大化歸依大道過蒙天地覆載丹靈所育皇乾所養星辰所衞日月所照四時所長皇老好生賜臣氣命逮及今曰仰禀太陽得厠人道某不以愚昧貪樂道法歸命至眞賜授法戒内外符籙三五治職及三洞金書玉章佩受巳來積年經載香燈供養但道重人輕非凡穢所可叨佩宿夜憂惶不以寧處臣等受法之日要當自竭愚短朝禮讀誦宣揚道德濟度一切及以自身修靜念眞日月之精注心玄虚修行之炁隂陽九轉三五成丹飛騰虚空白曰昇天非法不精非道不眞恐臣等前世今身所犯莫大之罪乞身中功曹吏兵衆官營衞臣等及生縁家口壽命上請祐衛將軍一人官將百二十人爲臣賷良方妙藥甘靈芝英金液玉漿充哺養赤子保國安神皆令無他願臣等學道昇仙長生度世出入行徃衆官吏兵乞垂衞護不負效信恩惟太上分别云云今年月三㑹都言功舉遷口啓章一通上詣三天曹云云除泰山死籍章具法位上言謹按文書臣某年若干屬州縣郷里住臣素以胎生宿縁幸㑹得屬上帝十二司命君伏按科法三㑹吉曰落泰山死籍削去有契上請倉生君八極五炁監年命令臣等及生縁大小壽三萬六千歲記名玉曆彌綸天地即自荷恩三月一時爲天宮君吏言功舉遷名加爵秩以報勞苦不負效信唯臣及生縁家口内外男女上下尊卑等身年命延長永爲種民臣千罪萬過乞丐原赦恩惟太上分别云云飛龍騎吏左右龍虎君各十八人出操臣以今𡻕月日拜上絶除泰山死籍口啓章一通上詣太上某宫曹治爲先亡言功章具法位上言謹按文書臣某年若干屬州縣郷里某處住臣素以胎生血誕之餘千載運㑹得遇太上開化之際盟威正教驅除穢逆但臣某禀炁暗鈍六情閉塞百行多違未有微功上答大造蓋聞道法三㑹吉日太上老君恩流八極澤潤無外生死蒙恩是以人清鬼平生死蒙泰臣今章奏告下天地水三官土府九江水帝河伯將從掾吏特乞一切之恩原赦臣等七祖父母前亡後化一切宿罪重過特垂放遣賜與沐浴上升玄都長生宫中神登紫闕衣食自然臣符闔觀得受餘慶福祚無窮注上生名玉曆青篇之中存亡咸泰永爲種民光顯王道清眞之信恩惟太上分别云云隂陽神訣吏左右龍虎君各十八人出操臣等吉曰謹拜遷達先亡解除基考謫罰口章一通上詣太上某宫曹治三月一時言功章具法位上言謹按玄科今據某素以胎生凡質穢濁得逢太上道炁開化恩流八極施布道法養育羣生臣以有幸得歸法門天師矜愍賜臣治職臣以肌腥賤質耳目閉塞無輔助之效夙夜憂惶不自寜安謹按文書天師節度一年三㑹吉慶十月五日都言功謹條臣所領籙上辭旨散民育物男女良賤命籍戸口年紀顯逹人名右列如牒臣從今年七月七日巳來承上三天無極大道諸君丈人天師法教訓喻百姓醫治百姓助國扶命即使肉人等改惡爲善捨逆爲順去故就新廢僞成眞臣身中吏兵功曹使者隂陽神決吏關啓千二百官君上請天官將吏兵熒惑太白中陣兵魁𩲃炁吏上清玄君五炁經君朱雀君日月天醫和醫太始剛武敢健吏百蟲君神男神女玄男玄女玉男玉女素男素女仙男仙女詭吏化君醫治疾病公私口舌行来道路移徙嫁娶葬埋作舎求乞保護臣及民所居郷里監察考召君吏道上二玄三元四始諸官君四野五野七野平都君田蠶六畜倍加衞護天師所布下二十四治三十六靖廬九州八極治化君將吏兵士五方驅除君將吏東九夷南八蠻西六戎北五狄中央三秦黃書契令十二月命君等男官女官二十四官男職女職二十四職及男女戸口所受籙上吏兵請守宅三將軍二十四吏兵士三十萬人等三曽五祖五將五神保護肉人等家皆得端正勞君苦吏願一切悉爲言功舉遷臣以闇塞不明鬼炁謹請漢南昌都集君還功君將吏一百二十人主分别諸將吏有功勞者分别皆當遷逹考召調正鬼炁十等上至百等從千等上至萬等遷入中宫隨功多少各還本所功曹顯逹受功者與便曹穩職無令失意或有恚恨者至來年正月五日依法舉遷臣及所願道民口數端正以爲效信千罪萬過乞垂原赦恩惟太上云云操臣爲依常品拜上十月五日三㑹大慶言功口啓章一通云云三㑹言功章某州某縣道士某年若干某月生稽首謹上啓太上老君天師嗣師系師三師君夫人門下典者但某千生慶幸值遇玄風忝𥨸道門身披冠褐蒙師尊而開度賜法籙以匡身忝正一之初階遷上清之極境伏以人麤法細違犯巨多晨夕乖於焚修晦朔闕於朝禮三元三㑹或失焚修八節庚申皆違醮閱身或穢觸衝突靈官口是心非違科越禁或思存散亂妄想俱生或喜怒無時酒食失度如上之罪無量無邊日徃月來無由洗滌今因某嵗三㑹吉辰拜奏大法言功章一通三五雜籙言功章一通資次伏願太上三尊天師衆聖開大宥之澤敷罔極之恩賜洗前愆蠲除徃過然乞臣所佩正一洞淵等籙至于上清上仙上靈二官吏兵仙童玉女文武官屬悉爲言功報勞益秩遷階咸受功賞受功事竟各歸臣身中安慰宮府守護臣身乞災厄蕩消衰危殄滅口舌不起怨仇叶和章醮符水願有效徵門徒興盛住持清泰出入休安得允所祈仰荷玄造請給謹狀酆都章具法位上言謹按文書某州縣某即日稽首謹叩頭乞恩拜章拔贖亡人伏聞太上有濟度亡人之法謹投大道未知亡人新逝巳來魂魄託生何道恐在世之日身處凡夫餐啖衆生烹炮物命無非是罪今請奏酆都拔罪章一通謹賷法信以爲證質臣某奏章伏願太上無極大道天師君慈父聖毋上官主者特垂大慈之澤原赦亡人前身巳來三業六情或積行所犯莫大之罪或犯一百八十條科輪迴萬劫冥冥長夜未測亡人魂魄作何驅役𨽻屬何官或恐在上中下二十四獄三河九江風刀之罪幽繫三塗請爲解釋臣今爲申奏章表乞賜亡人某魂昇三天魄離闇府永除苦惱逍遥福庭衣食自然天堂受樂次乞某家口大小永保康寧所願從心常保元吉以爲效信恩惟太上云云生死解殗洗蕩宅舍章具法位上言謹按文書某州某縣將領家口大小若干人即日稽首歸命太上今縁住宅生産死亡恐有殗穢宅中十二時辰行年本命害氣相侵今詣臣求乞章奏洗浣宅庭殗穢消蕩内外光明神龍備衞防保人口唯專一心上慿大道乞求章文解除殗穢洗蕩宅舍安穩無虞具如所陳臣以凡愚不明氣候輙承辭旨伏地拜章一通上聞天曹謹爲上請東方青帝解殗君南方赤帝解殗君西方白帝解殗君北方黒帝解殗君中央黃帝解殗君官將百二十人下爲洗浣肉人解除殗穢玉女使者官將百二十人各賷眞精之水五和之香蕩灑某家井竈等大殗入海小殗入江千殗萬穢應時消滅上請仙花玉女一千二百人與東方青龍主水使者南方赤龍主水使者西方白龍主水使者北方黒龍主水使者中央黄龍主水使者各賷眞精之水洗浣弟子某家住宅神靈内外清淨幷請勑河伯吕公子營校尉督一切水官將吏更相傳送除解某家内外神眞皆令清淨利祐人口大小若干人乞無災瘴宅舍安寧向去前途五瘟不染行年四出常保無虞以爲效信恩惟太上云云大醮宅章具法位上言謹按文書某州某縣某即日乞恩同心稽首口辭自列信向無功招延不善即日起造宅宇巳來未曽醮謝恐動土興工驚動宅上諸神幷及家口行年本命蠶室奏書博士不敢自專今謹請鎭宅十二禁忌紙章一通防保宅上人口平安具如所列唯專一心上慿大道向臣求乞章奏願爲降赴證明法教奉用鎭信以表五方靈官上請天官爲某住宅之中四面内外十二時辰二十四禁忌太歲大將軍青龍白虎朱雀玄武宅中伏龍日出日入人口行年本命一切神靈從立宅巳來未曽章醮今選吉辰良日謹於中庭安鎭法座鋪陳質信以表宅上十二時辰分解禁忌謹爲伏地拜章一通上聞天曹伏願上官典者特垂省理如蒙恩煦謹爲上請掾吏君五人治宅官五人制地君五人官將百二十人將軍十萬人一合來下將軍二十四吏兵三十萬人及宅中備位神明及所部里域眞官共部押宅中四面八方内外十二時辰二十四禁忌土公太歳大將軍太隂夫人青龍白虎朱雀玄武伏龍勾絞歳月大小二耗三公九卿將軍發盜本命子丑寅卯辰巳午未申酉戍亥宅中内外一切衆神即日即時應章上逹收歛十二時辰鎭於本位收捕宅上東西南北並請安穩無令觸犯竪屋事訖言功報勞以爲某家清淨一切衆神鎭宅之内宫室之裏錢財集聚羅綺盈堂一依符教收却四面災禍永不侵擾元元一心以爲效信恩惟太上云云開通道路章具法位上言謹按文書某州縣某闔門長㓜同心稽首叩頭乞恩辭但某塜宅衰凶神鬼侵逼禍下自招上延亡人年若干𡻕某月日時染疾困重無藥能療因此亡逝謹依俗禮棺殮在堂終始永畢未測亡人新逝巳來魂魄不知託生何道恐在世之日殺害衆生傷損物命繫閉三途未蒙解脫罔知作何功德拔贖幽關伏聞太上大道有解拔之科濟度亡魂之法謹賷法信獻五方靈官薦拔亡人魂魄闇通道路無有窒礙以今元元一心請求謄奏但以凡流不明氣候垂恩請省謹爲上請素車白馬大將軍一人太玄君一人各官將百二十人又請直符告下天地水三官女青詔書土下二千石丘丞墓伯十二塜侯泰山二十四獄皇天九平獄天一北獄東嶽泰山南嶽衡山西嶽華山北嶽𢘆山中嶽嵩髙山地獄北都寒池地獄牢檻諸獄九江水帝河伯河侯將佐掾吏一切放遣亡人伏願生前罪累並乞消除殁後愆尤隨章蕩沐浴清淨逍遥福堂遷爽淨宫參經洞府然乞弟子闔門長㓜家口平安以爲效信恩惟太上云云拔河章具法位上言謹按文書某州縣郷里某年若干某月日生即日口辭自列胎素肉人枯骨子孫千載有幸得奉大道從來蒙恩欣抃罔極但由肉人信向多違招延不利多有厄難夢想不眞所見不善推㝷算術云有河神之厄恐有衰疾慮致傾危今慿大道告訴向臣求乞章奏開度衰年厄月免離三河之厄臣輒慿口辭爲伏地拜章一通伏願三河四海九江水帝諸神君等解釋某衰年厄月水府之中但名係之處願爲開度無令繫閉諸獄又請東方青帝河伯水官南方赤帝河伯水官西方白帝河伯水官北方黒帝河伯水官中央黃帝河伯水官各百二十人來下主爲某解拔三河之厄伏願天地水三官女青詔書拔度刑厄永保無他以爲效信恩惟太上云云保蠶章具法位上言謹按文書某即日乞恩口辭自列今爲累年養蠶不收恐有犯觕以今月吉日良時於宅内上請東方青帝蠶室南方赤帝蠶室西方白帝蠶室北方黒帝蠶室中央黄帝蠶室蠶家先祖蠶家公姥蠶家子孫天上蠶室地下蠶室三十六蠶室照察某日夜悲愁罔知救護唯以一心上慿大道謹賷心信向臣求乞章奏上請五方代公代姥代家先祖代家父母代家子孫左右四方力士上請神君下鎭養蠶之姑養蠶新婦黒蠶如龍白蠶如虎行聲如風食聲如雨雷聲震動不爲禁忌但是殗穢並令消滅謹賷法信並在案前奉請五方養蠶之女又請五方養蠶之姑又請蠶父比陽之君蠶母北君之女爲某宅内今年蛾蠶如願播植長滋斥流瘟疫蟲鼠虚耗一切消滅伏願收繭萬石得絲千斤知道爲眞知章爲神謹爲某伏地拜章一通上聞三天曹伏願大道君吏上官典者特垂省察如蒙哀祐唯專一心以爲效信恩惟太上云云接算章具法位上言謹按文書某即日口辭自列素以胎生千載慶善得奉大道從來蒙恩誠深罔極但以凡夫不知璇璣斗建土宿臨刑恐年命厄㑹不輕元辰衝破天羅地網算盡將來九醜備縈日夜憂惶貞吉難保泉壤是虞唯專一心歸慿大道謹備法信之具表獻五方靈官即日告臣求乞章奏上詣天曹拔贖身命臣雖不明氣候輒承所請謹爲伏地拜章一通上聞天曹伏願太上老君諸君丈人三師夫人門下典者一切監司隂陽諸曹二吏施大慈之澤布罔極之恩願爲上請夀算君五人保命君五人消災君五人散禍君五人扶衰度厄君五人解羅脫網君五人官將各百二十人一合來下爲某拔贖二十四獄天曹地府古廟靈壇社稷將吏司命曹局㝷檢某身有諸罪目死名在黒簿之中者乞爲攺易有厄脫除有病爲愈巳枯更榮巳死更生衰中得度厄中得過月厄年災並爲散釋某年命不長壽算短促伏願大道弘慈立更生之道臣等謄其𧵥信上詣三天曹請拔贖某身命延年益壽削死上生今呈章奏之後家口大小災厄過度永保康平宅舍清淨塜宅潜寧九祖巳來逍遥自在元元一心以爲效信恩惟太上分别云云拜上禳星益算延年章一通上詣太上某宫曹治大塜訟章具法位上言今有某州縣郷里某甲投辭列欵稱門祚災衰家累疾病所作不利所居不安求乞章奏解除塜訟今據其事狀粗可根㝷必恐其七祖九玄周親近屬生存之日過犯旣多亡殁巳來被諸考謫子孫未與拔贖冥漠得以怨嗟或葬在水源之訟或殯當神廟之訟或墳塋穿穴之訟或棺槨損傷之訟或舊塜相重之訟或新塜相犯之訟年月浸逺胤嗣不知或水溺火燒之訟或蟲傷藥毒之訟或刀兵牢獄之訟或瘟疫癰疽之訟或伯叔兄弟或姑姪姊妹遞相連染以作禍殃有一於斯罔不誅責酆宫案罪因所甘心而玄律垂恩亦容追過臣輒依千二百官儀并正一眞人三天法師所授南嶽紫虚元君治病滅惡之法謹上請天昌君黄衣兵十萬人收某家中百二十殃怪中外强𦍙十二刑殺之鬼皆令消滅又請無上髙倉君兵一萬人爲某家收治五墓之鬼傷亡徃來住著子孫作殃怪禍害疾病某身致令死傷不絶者皆令消滅又請運氣解厄君兵士一萬人爲某解除家中逆注某身中刑厄十二刑殺百二十殃考皆令銷散注滯使制鬼滅禍遏却六天之氣又請益天大將軍大兵士一萬人萬福君五人官將百二十人石安君官將百二十人朔平君官將百二十人治玄始宫並爲某辟斥故氣收捕天下飲食横行鬼賊作諸精祟妨害某及家中大小者皆令收絶應時剪撲即使摧滅却死来生滅禍致福又請石仙君一人官將百二十人爲某家却滅强𦍙之鬼厭絶精祟不得爲害又請四相君五人官將百二十人爲某銷散家中有考訟鬼祟諸不正之氣侵擾宅舍致不安穩者皆即收剪解釋訟考分别清濁又請赤天食氣君官將百二十人爲某馳斥親屬逺近及有異姓之訟逮諸凶惡怨訴共相侵擾不肯散所爲祟害者悉皆制絶銷滅又請收神上明君官將百二十人爲某身解除惡夢錯亂魂魄不守精神離越者令得安善使夙注銷歇又請太玄君官將百二十人治無渠宫主某家有凶注之氣令人精神爽越疾病顚倒驚邪恍惚不自知覺者使銷滅賊害永無殃患又請制地君五人官將百二十人下治其冥泉宫爲某身并家中大小分解行年本命太𡻕土王墓辰建破諸所觸犯爲髙下卑㓜之鬼爲業害者皆令消滅又請無上天生君兵士一萬人無上方相君兵士一萬人並爲某收家門先後死亡有相注逮者令消滅之又請厄郷侯君官將百二十人治太清宫章釋君官將百二十人治太清宫又請祐護將軍吏兵賷太玄眞符攝下女青詔書地下二千石泰山二十四嶽爲某收捕分解塜墓殃逮之鬼告下地中官長丘丞墓伯蒼林君武夷君左右塜侯地中司激墓卿右秩蒿里父老諸地域所典並令斷絶考害復注之氣一切消滅若某家祖曽巳來先亡後死男女大小凡葬埋所在有犯十二月建破王耗八將六對傷絶禁忌音向不正哺次不得左前右後伏尸故傷妨害男女位座諸爲刑禍致不安穩子孫疾病者悉爲解釋和合隨源𥙷復反凶爲吉轉禍爲福生死幽明不相關渉請都星君官將百二十人治華蓋宫誅殃君官將百二十人治倉明宫太白中陣明君官將百二十人並爲某家七祖巳來先亡後化男女大小解星官復連收十二時刑禍遲留逆殺皆使除滅死亡斷絶復注若下官故氣假託形影導從鬼兵驅逼先亡傷注之鬼去來家門迫脅生人拘録魂魄致爲疾病者一依鬼律收治皆令消滅又請無上天玄君兵士一萬二千人爲某收治逺近貴賤尊卑男女凡諸有謀口舌誹謗呪詛之氣皆令伏匿不得爲害又請赤砂君官將百二十人治南昌宫爲某家收五蠱六魅百二十凶災及虚耗之鬼常爲某所居宅舍致費損不利者皆令消滅凡上請二十四君官將吏兵即日一合來下各隨本職爲某解散考謫消除殃祟和释諸所斷絶注氣先亡後死及種族親戚有横暴枉濫流亡客葬無後之鬼預是前八十一訟之事件百萬種種之考注並各寢息不得動作一皆消蕩若猶有欲興造怨望覘伺間隙因垂衰便搆扇禍害者盡皆收檢剪撲速令滅絶不得與某有相關渉存亡異境禍福各對當令某身并家口從今以去神氣流布天靈輔衞五藏調理六腑宣通眞精内充百病消歇行業成就功德日新吉祥咸降祅邪散滅公私昌熾存亡荷頼所請天官君將吏兵文武職司並立勤績驅除鬼害收剪有功請即爲言功遷賞加秩進爵差次髙下如天曹常科無使恚恨某所賷交𧵥紫紋四十尺命米一石二斗錢一千二百文著體淨衣一副狀紙一百二十張墨兩鋌筆兩管朱一兩書刀一口淨席一領淨巾一條即以酬官君將吏勤勞之效恩惟太上云云臣謹爲某身居疾病解先亡後死者考氣注逮拜上大塜訟章一通上詣云云又大塜訟章起自茅山七眞許長史云欲上昇爲上三世被𡨚家殃訟有西靈夫人告令求道官拜奏塜訟章以解洗𡨚債其章具有儀注若明日拜章今夜具備浴室五所如人之沐浴具備如力及先製小衣服三對兼具銀錢獻上先亡以充洗浣明日奏啓訖即燒章隨章燒衣服及錢財亦須嚴潔具備之又云夫人家事破落名宦不泰死厄疾病痛苦連年生業不興子孫替皆云上世考訟亡靈不安殃及生人子孫致之如然能三年内頻拜奏此章當有大益章詞臨時看意攺移當從簡正不可煩瀆具法位上言謹有某官某乙年若干𡻕某月日生貫某州縣郷里某爲戸頭即日叩頭稽首自列詞狀素以胎誕千生慶幸得奉大道荷恩資育得見今日伏以某身或有違忤或有所求或謀官宦或疾厄謝過祈恩住於此入語莫不因其修習乖違所行逆理建功𥙷過積善不及上累先亡之禍下責生人之咎致令某乙怪夢非吉所向多違修念有闕厄患臻集慮不全生莫悟考咎實懼上世巳來先亡後死墓謫不解塜訟相逮告訴臣求乞解釋臣某伏按人生禀隂陽之正氣受形氣於父母血胤連屬逮乎七世傍貫伯叔至于兄弟莫不善惡同源榮枯相繼陽官賞罰亦止此條幽府所施豈冝廣引服屬旣踈爲患自息且各有承嗣不相濫混臣以亡人魂爽動以物接記籍所明爲例甚衆但肉眼障滯不能照覩巫覡所見亦未窮察當是形聲旣分故音影莫㑹至於光像猶若于生然情念異同不必遵舊所以多致尤恨亟爲禍責今若不濟彼苦津離此怨路則終成深害咎祟方臻是以經教懇切毎念遷拔爲本訓誘欵曲必使解脫爲先而當年在世莫不罪多福少罪事旣多則乆嬰苦切福業旣少故理無所有是乃纒綿累業殃注不巳今慮某家先亡後死眷屬名狀冥府自然未皆放縱或有拘執責罰便生訟引且七世乆逺後胤莫測其中善惡不可詳省今者旣無的知其事謹備顯衆目具以陳言恐某家七祖巳來過去旣徃今於三官九府之中或有溺死之訟燒死之訟傷死之訟絞死之訟囚死之訟塡迮死之訟墮墜死之訟踠蹴死之訟打撲死之訟毒藥死之訟毒蟲死之訟産乳死之訟飢餓死之訟寒凍死之訟熱渇死之訟魔忤死之訟瘟疫死之訟中惡死之訟霍亂死之訟癰疽死之訟腫注死之訟癥㾋死之訟千疹百病以致於死皆各興訟又有老死之訟少死之訟孤死之訟獨死之訟鰥死之訟寡死之訟客死之訟寄死之訟祼死之訟暴露死之訟無棺槨死之訟有棺無槨之訟棺槨穿敗之訟尸體不埋之訟骸骨不全之訟鳥獸殘啄之訟火燒骨之訟水漬骨之訟車馬踐轢之訟掘鑿汙泥之訟已葬之訟未葬之訟葬非本墓之訟葬犯禁忌之訟葬不安穩之訟葬髙下東西南北之訟祖曽父母妻妾娣姒中外兒孫兄弟姊妹伯叔姑姪更互相訟育子不養之訟有兒不舉没爲奴婢之訟同姓之訟異姓之訟無宅之訟無後之訟憤慨之訟責怒之訟悲傷之訟奄忽之訟又生時與人有寵愛之訟有讎怨之訟有爭訴之訟有殺活之訟有枉濫之訟及死後受詰對之訟有慚負之訟有違約之訟有呪詛之訟受考罰之訟受徒繫之訟受謫役之訟受二十四獄罪報之訟受惡因縁牽引之訟次求恩赦之訟求還家之訟求人代之訟求迴逭之訟如此等訟訴之事各有條領若溺死之訟訴其沉淪水府衣形沾濕燒死之訟訴其髪膚焦灼皮肉剥爛傷死之訟訴其身形殘毀流連瘡血絞死之訟訴其繩約緊急氣息壅閉獄死之訟訴其鏁械拳孿不得解脫囚死之訟訴其囹圄幽嚴道理不暢徒配繫死之訟訴其赭鉗在身謫役苦劇塡迮之訟訴其肢體屈壓不得伸展兵死之訟訴其身首異處墮墜死之訟訴其筋骨摧碎踠蹴死之訟訴其體脉結瘀打撲死之訟訴其頭破臂折毒藥死之訟訴其腸胃潰斷虎狼死之訟訴其肌骨噉食毒蟲死之訟訴其皮肉腫爛産乳死之訟訴其腹裂腥臊餓死之訟訴其胃府空竭寒凍死之訟訴其戰竦冰噤熱渇死之訟訴其吸嚇喘乏魔忤死之訟訴其精魂怖悸鬼所制伏温疫之訟訴其寒熱顚倒經絞酖毒中惡死之訟訴其卒暴痛急不得申開霍亂死之訟訴其飲食過度氣脉翻錯癰疽之訟訴其皮膚膿血藏腑傷潰腫注癥㾋中風上氣千疹萬病之訟各訴其沈滯困劇老死之訟訴其筋骨疲頓少死之訟訴其年志未成孤死之訟訴其㓜無父母獨死之訟訴其老無兒息鰥死之訟訴無妻妄寡死之訟訴無夫對客死之訟訴其非舊郷寄死之訟訴其非本宅祼死之訟訴其無衣衾露死之訟訴其無覆蓋無棺之訟訴體親土壤無槨之訟訴朽腐開顯棺槨穿敗之訟訴漏不蔽尸體不埋之訟訴其求痤掩骸骨不全之訟訴求聚合鳥獸殘啄之訟訴失肌膚燒骨之訟訴求𥙷復漬骨之訟訴求髙燥車馬踐轢之訟訴求移攺鑿掘穢汚之訟訴求遷濯已葬之訟訴求修理未葬之訟訴求墳塜葬非本墓之訟訴非土域犯禁忌之訟訴干觸神位不安穩之訟訴地氣衝激髙下四方之訟各訴其處更須轉動六親九族之訟各訴其生人違背恩紀育子不養之訟訴天性忍害不得生成同姓之訟訴無情禮異姓之訟訴相輕濫無宅之訟訴非所歸無後之訟訴絶祭祀憤慨之訟訴志氣不逞貴怒之訟訴人侵割悲傷之訟訴多厄枉奄忽之訟訴不獲辭又生時所與人仇讎事各有訟訴並是怨結莫申追想引逮其亡後所興諸訟皆由不能自忍求對生人大畧雖合八十一訟其中枝葉分散變成百千萬種又有生爲愆罪死受責罰湯煑火灼風刀電解負石鑿山漕江壅海如此之目復百千萬條悉皆訟引子孫更相攝對又有隂伏匿怨内疽隱恨發念出言起訟幽顯或值時世不理患難迫身不勝哀憂心悲口毒劇言怨語呼天喚地辱詈光景穢罵神祇事徹暁冥皆成訟考又立行醜逆搆業無良犯諸科律禁誡悉入考目百年五十年三十年二十年十年一年一月一日一時積考相加衆考集併命没巳後餘考不息纒綿累積世世不窮不知某家七世巳來先亡後死於此諸條並何犯坐或復捨命之日不自甘分怨天咎地呼引鬼神亦致遺殃相連終不解釋或有臨民理務枉刻無辜殺人取財囚人受貨因公行私狠戾暴虐或妻妾閏照察不明信用偏邪寵縱讒賊持上逼下怨酷叢生祝禱鬼巫厭迮年命使取魂魄殺以償咎因是相訟亦無窮極又恐某家七世巳來復有隂罪隂過陽罪陽過死罪死過表裏沈舋内外怨穢無德無恩不仁不孝欺妄狡詐違常悖理塞源拔本指是作非天地所弗容人倫所共棄没命三官皆嬰對罰罪相及世結固督切考課終無止息魂爽艱急日就難忍不堪荼毒辭訴鬼官求引生人代其劇苦幽司雖明亦有曲佞或能聽理鬼言移檄召對致某家累年疾厄頻𡻕災衰光怪夢寤錢財耗減無可禳厭告乞玄師臣某復覽誥傳唯應分解塚訟墓注爲急直旨研明𥨸思承奉願遵幽宻護物爲功驅馳謹按未敢懈怠但聖匠遼逺軌跡遷訛迷非悶悞靡知定本輒極心究校詳盡愚誠參順經科備伸䖍奉依法謹賷布素一百二十尺五方繒紋白素各八十尺掃箒五枚糞筐五枚朱砂一兩二分席一領狀紙二百張筆墨各二副書刀一口錢五千文油一斤香三兩米二石四斗并先宿備沐浴洗浣之具臣謹爲伏地拜章一通特願上官典者垂神省覽爲某家分解先亡後死塜訟訴注之氣令復注絶滅逮害潛消人鬼異路生死乖隔謹請天官君將吏兵各司所主共爲某家厭制墓氣解散殃咎降某家塜瘗之所又於酆都泰山河海丘陵諸謫役之處三官三府各隨源檢糺必使洗釋輒按千二百官章儀并正一眞人所授南嶽魏夫人治病制鬼之法爲某家上請太玄君五人官將各百二十人又請左右都候官將百二十人治太明宫又請祐護將軍吏兵太玄眞符攝解塜墓殃注逮之鬼并隂害加符告下某家各用本音姓角姓塜訟交通所屬勾芒之神徴姓塜訟交通所屬祝融之神高姓塜訟交通所屬收之神羽姓塜訟交通所屬玄冥之神宫姓塜訟交通所屬勾陳之神也及丘丞墓伯地下二千石蒼林君武夷君左右塜侯地中司激墓卿右秩蒿里父老諸是地域所典主者並嚴加斷絶某家塜訟之氣復注之鬼若某家自上係髙曽祖父母巳來諸塜墓所在有犯十二月建破王耗八將六對傷絶禁忌音向不正哺次不得左前右後伏尸某姓男女位坐並爲刑禍虚耗不息妨害子孫者兼爲解釋和合𥙷復使生死咸安卽請大玄君官將百二十人治無渠宫又請九地君官將百二十人治茂理宫一合下主爲某家分解葬埋所犯十二月建破王耗及十二丘墓塜訟之鬼一切須滅又請都星君五人官將百二十人治倉明宫又請太白中陣明星君官將百二十人等一合下並解某家七世巳下前昇後化亡人星宿官將復連收十二刑禍遲留逆殺除落死名止殺滅殃又請赤天食氣君官將百二十人主驅斥親踈逺近及有異姓訟逮諸凶惡之鬼又請無上髙倉君兵士十萬人主收五墓之鬼傷死徃來病祟生人者又請四胡君官將百二十人主消考訟之鬼不正之氣致不安穩者又請收神上明君官將百二十人主收轁𨎺不寧惡夢錯亂魂魄不守者又請天昌君黄衣兵士十萬人主收某家中百二十殃怪中外强𦍙十二月刑殺鬼又請蓋天大將軍十萬人主爲某家辟斥故氣斷絶注鬼却死來生却禍來福又請太白君百萬人都官從事考對殺君各有種數千萬人一合下營護某身并某家却死籍上生名斷祖世中外亡人死注清濁之氣破殺尸殃之鬼不得伺候牽引更相注逮若下官故氣假託形影道從鬼兵脅迫亡人還逮家門者一依女青詔書律令收治絶滅所請十五君官將吏兵等願一合來下各隨本職爲某解除亡人考謫療治衆苦痛惱之疾盡得平安克使訟訴不生殃注絶息某家諸先亡後死中種族異姓親戚周旋朋友奴婢僕妾横暴枉濫流亡客葬無後之鬼預是前八十一訟之事及百千萬種殃考注逮等各皆潜寧休息不得復動作爲害若猶欲怨望覘伺間隙搆扇禍害者各盡收執速令永滅不使更興章御之後賜某家前亡後死祖世亡人罪蒙原赦魂昇三天塚墓安寧考訟沉靜福被當今慶流後代子孫隆茂宦學光顯計圖勝展公私利昌疾病除差怪消夢正存亡獲福以爲效信所請天官依都章言功不負丹誓恩惟太上分别求哀臣愚謹因二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏官各二人岀操臣謹爲某官某乙身處官徒官職沉滯名位不遷或云累代門户衰微子孫凌替或云官私屯厄口舌横生任隨本意言之在臨時攺張拜請天官分解亡人塜墓考訟殃祟安死利生制滅禍害乞恩章一通上詣太上某宫曹治伏須告報臣某誠惶誠恐稽首再拜以聞赤松子章曆卷之五
