body:
  text: 斷𩲲泉章具法位上言云云某即日叩頭自列口乞恩辭素以胎生千載慶幸得奉大道忝切蒙恩頃者巳來居處轗軻疾病相連卜筮云是山泉三河爲禍并此間土地山林覓食之鬼侵害某身憂怖屏營不知修何功德唯用一心上慿大道以救性命告訴向臣求乞章奏收除里域東西南北山泉四壟河中諸雜鬼神横行禍祟之者一切乞令收斷臣職叨典治謹爲伏地拜章一通乞太上老君太上丈人垂恩料省原赦某身恐是山丘壟泉三河五河乳母等鬼作此妨害上請麾幢大將軍陂湖大將軍各五人返甲逆鱗大將軍五人兵士一萬人重請覓音大將軍官將各百二十人搖天動地九氣君吏兵士一千二百人請左靈君右靈君髙天大將軍盟威君八卦君各宫將百二十人上請東方九夷君九九八十一官君寅卯辰甲乙君南方八蠻君八八六十四官君巳午未丙丁君西方六戎君六六三十六官君申酉戍庚辛君北方五狄君五五二十五官君亥子丑壬癸君中央三𥘿戊已君千二百人上請誅符破廟君萬六千人太隂太陽太醫君治病功曹官將兵士各百二十人同心併力下爲某收捕鬼賊付與天丁力士天一北獄依法治罪不令脫漏上章之後悉令斷絶蒙恩之曰以爲効信恩惟太上云云爲某收斷河泉惡鬼章一通上詣某曹伏須告報解天羅地網章具法位上言云云某身及妻子並有厄難恐爲天羅地網以見纒結告訴向臣求乞章一通臣以學淺不明氣候無精算術皆慿六甲五行更相剥復以知曆數凡以戍亥絶陽之郷爲天羅辰巳絶隂之地爲地網年命㑹此則受其殃男以本命臨太𡻕功曹加生月爲天羅傳送加胎月爲地網女以本命臨行年爲天羅河魁加胎月爲地網復以行年臨本命功曹加胎月爲天羅傳送加生月爲地網又天綱臨太一下爲天羅胎在登明下爲地網五刑六害七傷九厄之月及以衰年衰月魁綱雜殺千凶萬患妨損非一恐某家大小年命有犯五方羅網九宫八卦更相尅伐仍是九天玄極之氣下遊世間縱横九百九里羅者如炎火網者如黒雲悉帶九星精氣赤精煥爛若人年命當之立見凶損某今賷法信素絹一匹錢一千二百文白米一石二斗油一斗二升紙一百二十張朱繩一百二十尺釧子一雙素絲一兩筆墨香燈等伏惟天官恩盻太上無極大道天師門下典者五氣君垂神省念上請東方寅卯辰甲乙青氣君解除東方青厄青毒南方巳午未丙丁赤氣君解除南方赤厄赤毒西方申酉戍庚辛白氣君解除西方白厄白毒北方亥子丑壬癸黒氣君解除北方黒厄黒毒中央戊巳黄氣君解除中央黄厄黄毒五方之氣十二時候皆不敢爲害臣聞上三五爲天中三五爲人下三五爲地天有五行地有五氣人有五常天不失五行則曰月精明地不失五氣則萬物滋生人不失五常則能生長禮樂獲全某家恐五氣不合臟腑不調五行更相尅剥伏願上官典者爲某上解玄象五星之考氣下解地上三十六禁忌中解某等身中千罪萬過謹請北斗七星貪狼巨門斷絶死源禄存廉貞替易死形文曲武曲削除死録謹請解厄君太皇萬福君運氣君玉曆君各官將百二十人下爲某收捕衆災分解諸厄從一厄至于九厄所居里域眞官注氣監察考召太祖父母家親丈人一切遷舉進入中宫署與功賞使分曹署職隨功加秩天曹科典令存亡受恩幽明相祐要以某身年命延長災厄度脫以爲效信恩惟太上分别驛馬章亦云開度章具法位上言某以胎生下官子孫千載有幸得奉大道從來蒙恩某今當驛馬發年是求福之𡻕若不章奏扶迎恐有妨害年命傷尅官禄不遷但以憂慮無功可修專用一心上章奏表禳却驛馬之厄扶迎官禄不爲災害今賫法信金人一軀五色綵等前件物將立心信求㧞除驛馬之厄遷舉財禄過免時災永保元吉得入生圖扶迎驛馬以保壽命闔家大小並乞無他臣以愚昧不明氣候聞太易有𥙷過謝罪之功遁甲有向建避凶之道元元一心上慿太上大道諸君丈人天師君三師夫人門下或三命巳窮一期載續謹請皇天上帝王相華蓋北斗君三天司命加禄君扶命君扶持驛馬得成官禄以金人一軀上詣北斗㧞命除死厄五色綵各一匹以詣五方五帝迎益官禄紫案巾牙笏衣幘木履等以證禄位紫𠌂蓋一張以蓋本命席一領以鋪正座油一斗二升以徹照虚玄青絲算子延續禄壽米一石二斗以益倉粮紙墨筆以書立生籍錢一千二百文以證質丹心香一斤析北斗落死籍南斗上生名延壽無窮重請功曹生氣君吏上詣太玄都生宫請調星度算替名易形上請度命君呼魂君北詣玄隂御女君延續姓名君各五人官將百二十人爲某扶迎驛馬官禄超榮災厄殄滅光明心腑乾坤震巽坎離艮兊八卦二十八宿三丘五墓所典節氣善功付度周而復始上請祐命將軍萬福丈人解患君運氣君解厄扶衰君各十五人官將百二十人下爲某同心併力保守身命禄位髙遷延年益算榖帛盈倉錢財集聚永保元吉所請天官預有功勞依臣三㑹吉曰言功不負効信恩惟太上分别哀臣愚劣謹因二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏官各二人岀操臣某謹爲某求乞和合驛馬除災厄迎財禄乞恩章一通上詣某曹伏須告報臣某誠惶誠恐稽首載拜以聞謝五墓章具法位上言謹按文書今據郷貫某云今月某日染疾進退不差恐不存生某家三曽五祖七世父母巳來生時積罪招延殃釁或塜墓之中有訴訟之害嗔怨天地致使亡人不安擾動生人或岡勢斷絶松栢爲人所伐斫掘塼邊行徃道路侵逼墓所深恐一旦没溺泉壤云除巳備奏諸天帝尊申三界眞司牒合屬去處外今賷法信黄繒一匹白米一石二斗油一斗二升錢一千二百文紙筆香果等仰慿大道求乞章奏解謝先亡安穩塜墓從生及死千罪萬過並乞消除輙承口辭爲伏地拜章一通上聞天曹願垂省察原赦先世及新亡并乆逺及新舊墳墓所犯呪詛𡨚氣者悉爲斷絶即求差愈先亡安穩塜墓清寧上請謝墓君五人又請都星君青蓋官都候君太清宫主及地甲君各官將百二十人下爲某消除疾病解謝先亡或墓在龍頭或葬在龍尾或葬在龍左或葬在龍右或葬在龍足舉動縮伸盤旋禁忌之處致令亡人魂魄震動恐怖不安返害生人致使生人轗軻疾病附注並乞消除五音丘丞墓伯塜中二千石諸塜考氣皆使滅絶安穩亡人無有殃禍一切原赦願存亡無責無罰一切和解見在家口興隆嗣胤不絶不負効信恩惟太上分别求哀臣愚謹因二官直使正一功曹左右官便者隂陽神決吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏官各二人岀又因某日辰從官云云二人直神從官符吏隨日辰易擧此爲例操臣謹爲齋主某家大小疾病上拜請天官六龍謝墓遷逹亡人和解考氣乞恩寳章一通上詣太上某曹治某宫曹治隨日月換擧此爲例伏須告報臣某誠惶誠恐稽首頓首載拜以聞空三行臣某屬某宫焚修空三行空三行空三行可漏用全紙一幅爲之内方函外方函解五墓章具法位上言臣謹按玄科今據郷貫某叩頭自列素以胎生下官子孫但某身中今嵗行年到某辰上入墓之年或爲五墓所纒及三殺之下夫人入墓之年恐被墓神注連鬼氣纒繞比者脚手沈重飲食不加罔知拔贖五墓災厄扶護身命唯以一心上慿大道仰希鍳照特垂救護今賷法信鍚人五軀命米一石二斗命錢一千二百文命素一匹油一斗二升絶筆算子百二十枚向臣求乞章奏斷絶亡人殃禍令以鍚人代形分解災厄延年保命謹以拜章一通上聞願天曹上官典者垂恩照省原赦某身年七世巳來所犯千罪萬過並賜除蕩五基五方之厄來臨者以鍚人五形代之令弟子無有錯悮之厄上請還命君壽命君延命君拔命君續命君扶命君益命君各五人官將百二十人下同爲某上詣南宫中司命司録轉贖弟子性命三藏一期三百一時解除身中災厄當爲排天門却死籍移名青録長生之簿永爲後世種民上章之後某身中年命延長五墓殃注並令斷絶五墓災刑返爲恩福以爲效信恩惟太上衆眞分别求哀臣愚謹因同前章只換直神云謹爲某上請天官解除五墓殃注災厄鍚人代形乞恩紙章一通上詣太上某宫曹治同前章式謝先亡章具法位上言臣謹按玄科今據郷貫某比者中外夢想紛紜精神愡恍或鬼賊屯集口舌横生錢財耗散怪祟屢見田産不收蓋由觸犯先亡翁婆先祖左社右稷井竈土公凶神惡鬼闔家惶怖仰慿大道告訴向臣求乞章奏都謝城隍社廟神祇諸部將軍大小虚耗十二禁忌一切先亡並蒙解釋具如所列臣以愚昧不明氣候謹爲伏地拜章上聞天曹伏願上官典者以時平省垂恩鍳照謹爲上請解過君解刑君解厄君各五人官將百二十人爲某都謝先亡却除災厄保護人口平和從今年章御之後千罪萬過悉蒙原赦願某家口大小危中得度敗中得成難中獲免死中得生所請天官君兵士等有功勞者依都言功舉遷不負效信恩惟太上衆眞分别求哀臣愚劣謹因同前章只換直神云謹爲某拜請天官都解謝先亡乞恩報章一通上詣太上某宫曹治同前章式保胎章具法位上言臣謹按玄科今據郷貫某即日口辭自列素以胎生下官子孫千載有幸得奉大道被受元恩某與妻無功可記有罪斯多深恐一旦受此冤苦無所任持向臣求乞保胎收却河邪乳母産婦懷胎後傷亡容闇鬼賊謹爲拜章一通上聞天曹伏願無上大道太上大道君太上老君上官典者以時平省謹爲上請安胎君二人護胎君二人扶衰度厄君二人萬福解厄君二人官將百二十人下爲某妻防保身命胎妊易生又請保胎聖母君二人官將百二十人爲某妻守護三元丹田之中辟斥邪精魍魎鬼賊守養赤子當令某妻身得安全免遭艱阻保護胎妊安穩六甲足滿十月子母相見並蒙安貼乞天門大聖擁護某娘身體和釋無生煩惱當爲諸君聖母言功報勞以爲效信恩惟太上衆眞分别求哀臣愚劣謹因同前章只換直神云謹爲某妻保胎章一通上詣太上某宫曹治催生章具法位上言臣謹按玄科今據某即日口辭自列素以胎生愚昧荷蒙天地重光之覆某妻妊娠月數巳滿恐臨生不安倍増惶怖唯用一心上慿大道告臣求乞章奏上聞天曹不勝欣荷臣謹爲伏地拜章一通願上官主者以時平省謹爲請天門子戸君二人速生君乳毋君導生君生母君天醫助生君催生君各二人催生黄帝伏在中庭欲見子母形體上請監臨坐草六百生父守護某妻身生産滑利捨逆從順辟斥衆忌𡻕殺月殺時殺白虎咸池千邪萬精一切消滅母子安全如願從心解脱無他謹爲諸君聖母祐助衆神言功報勞以爲效信恩惟太上衆眞分别求哀臣愚劣謹因如前章只直神云謹爲某拜天官催生口啓章一通上詣太上某宫曹治小兒上光度化章具法位上言云某即日居某村坊叩頭自列宿縁有幸得奉大道欣慶無涯但某凡愚信奉多違招延考氣頃者巳來有男某夢想紛紜恐以不爲祥瑞四攴虚弱慮染沈痾莫知何功可以防保今賷法信投誠委質上慿大道告訴向臣求乞壽命延長上光度化増算益年扶衰度厄臣謹爲拜章一通上詣三天曹伏願太上髙尊無上元君慈父聖母上官典者特乞平安上請天地五光君日月星宿五光君東方請日光西方請月光南方請火光北方請水光中央請土光上請壽命長生付著某身形上請壽命君五人火炬君五人三魂七魄君五人各官將百二十人下爲流布天仙妙藥太和之氣入某身中還顔復色精光恱豫上詣天官與落死籍蕩滌故氣注上生名六腑調和五藏安穩光益壽命一切精崇並令消滅夢想眞正飲食甘美長保安全以爲效信恩惟太上衆眞分别求哀臣愚劣謹因二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏飛龍騎吏官各二人岀操臣某謹爲某拜請天官上光度化口章一通上詣太上某宫曹治保嬰童章具法位上言謹按文書某夙生慶幸得奉大道從來荷恩實爲無量但某信敬多違男女若干𡻕今在童兒未有所識即曰憂惶恐爲故氣邪精尸暗穢乳毋化神天地河伯鉤星血没之鬼承闇構禍侵斥某身求臣保祐伏地拜章上聞天曹特從太上老君諸君丈人天師君門下主者五氣君垂恩省理上請陽仙護魂君隂仙護魄君天養生君按摩某身削除脾肺賢中大小腸膽上下幽都氣海道氣宣布百脉通利病厄消蕩顔華光澤與日月同輝上請太皇萬福君解患君東王父西王母君各五人官將百二十人三天九宫甲子甲午官君一切鬼毒並不侵損仰荷鴻恩以爲效信恩惟太上分别云云爲某拜請天官爲保嬰童章一通上詣太上某曹云云斷亡人復連章具法位上言臣謹按仙科今據某云即日叩頭列狀素以胎生下官子孫千載幸遇得奉大道誠實欣慰某信向違科致有災厄某今月某日染疾困重夢想紛紜所向非善㝷求算術云亡某爲禍更相復連致令此病連綿不止恐死亡不絶注復不斷闔家惶怖恐不生全即日詞情懇切向臣求乞生理輙爲拜章一通上聞天曹伏乞太上老君太上丈人天師君門下主者賜爲分别上請本命君十萬人爲某解除亡人復連之氣願令斷絶生人魂神屬生始一元一始相去萬萬九十餘里生人上屬皇天死人下屬黄泉生死異路不得擾亂某身又恐亡某生犯莫大之罪死有不赦之𠎝繫閉在於諸獄時在河伯之獄時在女青之獄時在城隍社廟之中不知亡人某魂魄在何處並乞遷逹今得安穩上昇天堂衣食自然逍遥無爲墳墓安穩注訟消沈某身中疾病即蒙除愈復連斷絶元元如願以爲效信恩惟太上衆眞分别求哀臣爲某上請天官斷絶亡人復連章一通上詣太上某曹治疾病謝先亡章具法住上言謹按玄科今據某云但某以信向多違招延災祟頃者已來怪異屢表疾病更互合家憂惶㝷究算術云是家先并客死之鬼嗔責生人恐是前後年節祠祀飲食不精所設微薄爲後世禍祟所伐乞丐太上大道君遷逹迴轉去離憂苦之處謹爲上請保護君護命君各五人官將百二十人爲某身典治鬼等所有疾病厄難原赦除愈以爲效信恩惟太上衆眞分别求哀臣爲某上請天官疾病謝先亡章一通上詣太上某宫曹治收除火殃章具法位上言謹按玄科今據某州縣郷貫某即日口辭自列素以胎生下官子孫千載有幸得奉大道從來蒙恩誠實欣慰某以凡昧修奉違科屢招災考比者巳來聞見不眞忽以某時見火殃落在某處所光影耀地恐是死殃火殃散漫村坊侵害百姓男女遭罹非一吁嗟道俗不可稱計憂惶恐怖何以禳却仰慿一心上告大道謹依師法伏地拜章一通上詣三天曹令火殃即時消滅上請中官諸官君及錄上將軍二十四吏兵士三十萬人天地水三官算考召君吏道上二玄三元四始甲子諸官君四面方位社邑里君四野五野七野九野都平君等所居某里中眞官注氣上請北方太陰君官將百二十人治大隂宫又請夙伯雨師消滅某處火殃速去千里又請誅殃君官將百二十人所部宋無忌主收火殃之鬼令不燔燒良民所居住宅屋舍倉囤上官典者勑東方心尾二宿藏火精攝巽神勑風伯藏伏氣非節不行又請九海北玄君官將百二十人動畢星宿昇隂氣興散雨雲制伏火殃令不得起某等村坊某家悉令災火不發竟𡻕無他宅舍安定人口平吉以爲效信恩惟太上衆眞分别求哀臣爲某拜請天官收除火殃口章一通上詣太上某宫曹治上清言功章具法位上言謹按文書牒得某州某縣弟子某年若干某月日生伏自惟省素以胎蒭微蔑宿縁幸㑹得奉大道歸命正眞荷四時所養皇老好生太上惡殺賜臣氣命逮及今日仰受太陽之恩謬蒙師道之澤賜署治籙進叨老君道德五千文尊經洞神洞玄洞淵洞真等法奉受之日要當供養寳文修功立德行合神仙長生度世永壽無極縱不得仙度託命太隂受煉更生化爲眞人免脫三塗道重人輕實非尸肉所行參佩廣開法門舟航一切濟度天人存靈念眞餐御吐納注心玄極修行生道非法不精非法不眞但臣積世無狀七世巳來莫大之罪結固未巳至有誠心未能潜隱特以伏地奏聞爲臣所佩三洞經法等五帝眞靈玉女直符直事領仙侍郎監察大夫日月星宿五嶽四瀆十方眞官法上將軍吏兵千乗萬騎悉同言功報勞上詣玄都進品上仙加爵帝秩隨科署眞無令遺失臣某家七祖父母去離苦惱上登天堂衣食自然天下太平臣某學道未備俯仰之格道法難精前後施爲不合儀式爲四司所紏五帝所執千愆萬過乞蒙原赦臣某身中五體眞官受秩事竟各還臣身中保氣全眞安穩如故恩惟太上衆眞分别求哀臣謹爲拜上天官言功報勞章一通上詣太上某宫曹治三五雜籙言功章具法位上言謹按文書某州某縣弟子某年若干嵗某月生伏自惟省千𡻕幸㑹得奉大道被受元恩臣某仙靈二十四治籙籙上將軍吏兵奉受之日誓依師教優使吏兵醫治百姓修身之外救物爲先三㑹吉曰舉遷言功臣自受任巳來諸所施行皆如所願謹依科法以今月某日三㑹吉辰拜奏言功章一通爲臣所佩受三五上靈官一將軍籙三五上靈官十將軍籙百五十將軍籙赤天中部赤籙赤天三部三將軍籙百鬼召籙混沌赤籙九州社令籙星剛二十八宿籙河圖籙解六害神符籙九鳳破穢籙都章畢印籙華蓋籙九天兵符籙九宫捍厄八卦護身籙考召籙斬千鬼萬神籙大斬邪籙四部禁氣籙斬河邪籙功曹籙保命長生籙等二十四階法籙六壬太一雷公三十六部神式籙八史君六甲攴干靈符十二月將時直二十四治職將軍籙孝道仙王一十八階征山神將籙中宫敢健剛武强伐商天萬丈百鬼中王都官從事髙功司馬中騎大將軍八極排天延夀六星斗君中黄司政君元黄九仙司直君魁頭主剌君剛頭司殺君消災散禍扶命解厄君天騶甲卒天丁力士等保守臣身如故令臣所向金石爲開水火爲滅所厭者伏所治者愈所解者開所繫者破所消者散衆惡邪賊欲見中傷臣身者一切㓕絶令臣某得蒙過度三災九厄凶世惡年萬姓歸仰覩見太平奉迎聖君永爲種民過泰之恩以爲效信恩惟太上云云今因三㑹大慶奉爲身中所佩三五將軍内外雜籙君吏拜上言功章一通上詣太上三天曹云云載拜以聞絶泰山死籍言功章具法位上言謹按文書某州縣郷里觀上清大洞三景弟子某嶽先生臣某等年若干某月生素以胎生千載有幸得奉大道師老垂矜賜署治籙不以凡愚叅佩經寳眞秘重沓荷恩過泰欣慰罔極但臣某雖叨妙法不閑科禁功無絲髪愆犯罪積累年轗軻生途不稱居住不安命屬皇天上帝十二司命君謹按天師舊儀三㑹吉日斷除泰山死籍削除右契罪名死目改定生籙注上生各左籙長生宫中上請倉生君一人請爲三官將吏兵士一切言功受賞如常原赦臣某等所犯謬誤之𠎝先亡眷屬同免苦楚受大福德衣食自然殃疰斷絶道氣降附存亡清泰以爲效信恩惟泰山云云爲依法三㑹言辰拜上上請天官斷除泰山死籍攺定生録乞恩紙筆章一通上詣太上某宫曹治遷逹先亡言功章具法位上言謹按文書某州縣觀上清三洞三景弟子某嶽先生臣某年月生素以胎生千載有幸得奉大道兼蒙師眞賜佩天官治籙叨忝經寳以存供養臣以好道樂生奉宣文書助國扶命勸化萬民百姓一切蒙恩太上大道諸君丈人重恩成就伏聞大道三㑹吉日太上老君下流八極澤潤無垠臣等先亡三曽五祖七世父母前亡後死五服種親或恐執繫地獄之中未能下解者乞丐太上大道君上官典者願臣今奏章告下天地水三官泰山二十四獄中黄天九平獄中都大獄水官土府九江水帝河伯吕公子將從掾吏徒謫役作罪目五盟七詛不忠不孝隂惡咎匿從天至地一切原赦令臣學業成就智慧増廣宿愆赦貰存亡安泰以爲效信恩惟太上分别云云今月日三㑹吉慶自拜上遷逹三曽五祖七世父母乞恩𥿄章一通上詣太上三天曹云云載拜以聞百姓言功章具法位上言云云但臣依天師舊式以三㑹都治舍所領戸化民依天師文書輟死言生并天師昔所布下二玄三元四始甲子諸官君將吏兵二十四治官將吏兵等言功舉遷令依科禁不敢不聚㑹謹於所在某處郷甲觀中條列所領戸化民百姓男女求恩乞願並佩正一盟威等籙二十四階七十五童子并及散民等願請無上玄老太上三尊將軍吏兵守宅三將軍兵士三十萬人保護某家口男女使三災九厄並乞隨章蕩散并臣身中内外種親及所佩法籙等前亡後化男女之鬼並乞遷逹免離諸苦上昇天堂斷絶復連宿疾除差日就安穩蒙恩如願以爲效信恩惟太上分别云云依常品拜上今年某月日三㑹吉慶言功云云載拜以聞赤松子章曆卷之四
