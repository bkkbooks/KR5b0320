body:
  text: 米一石二斗油一斗二升命素一疋淨席一領筆二管墨二笏五方綵隨方色紙二百四十張銀鐶一雙重一兩二銖香二兩請雨得水過止雨章米一石二斗油一斗二升命素一疋淨席一領華二管墨二笏五方綵隨方色紙一百二十張香一兩錢一千二百文却蟲蝗䑕災食苖章明信儀收䑕災草闕信儀收除虎災闕信儀解呪詛章闕信儀消怪章芒繩一百二十尺刀一口五方綵隨方色錢一千一百文米一石二斗筆一管命素一疋墨一笏禳災却禍延年拔命却殺都章命素一疋錢一千二百文油一斗二升米一石二斗紙二百四十張筆二管墨二笏香二兩果子本命謝過口啓章闕信儀飛度九厄天羅章青絲一百二十尺算子一百二十枚米一石二斗命素一疋錢一千二百文香二兩紙一百二十張油一斗二升筆一管墨一笏却三災章闕信儀青絲拔命章命素四十尺米一石二斗錢一千二百文𥿄一百一十張筆墨各一算子百十枚錫人五身香一兩油一斗二升疾病醫治章闕信儀疾病困重收減災邪拔命保護章闕信儀扶衰度厄保護章命素一疋米一右二斗錢一千二百文油一斗二升香一兩紙一百二十張筆一管墨一笏謝土章闕信儀却虚耗鬼章闕信儀言功安宅章闕信儀斷瘟毒疫章闕信儀斷𩲲泉章闕信儀解天羅地網章命素一疋錢一千二百文白米一石二斗油一斗二升香一兩紙一百二十張朱繩一百二十尺釧子一素絲一兩筆一管墨一笏驛馬章亦云開度章金人一身五方綵各一疋紫案巾牙笏一冠一衣一領幘一筆墨算子紙青絲席一書刀一水履一紫𠌂蓋一錢一千二百文米一石二斗命素一疋油香謝五墓章黄繒一疋白米一石二斗油一斗二升錢一千二百文筆一管紙一百二十張墨一笏香一兩果子解五墓章錫人五形米一石二斗錢一千二百文命素一疋墨一笏油一斗二升紙一百二十張筆一管算子一百二十枚謝先亡章闕信儀保胎章闕信儀催生章闕信儀小兒上光度化章米一石二斗錢三百六十文命素一疋紙一百二十張保嬰童章闕信儀斷亡人復連章闕信儀疾病謝先亡章闕信儀疾病破棺章闕文白素四十尺金人一形刀一口斧一張鑿一大槌一鋸一炭三十斤木衝一雙鍬一紙一百二十張錢一千二百文筆墨一副油一斗二升收除火災章五方綵五疋素絹一疋銀鐶一雙錢一千二百文墨一笏米一石二斗油一斗二升紙一百二十張筆一管席一領絳巾一丈二尺甲子丐過章闕文信儀上清言功章闕信儀三五雜籙言功章闕信儀絶泰山死籍言功章闕信儀遷逹先亡言功章闕信儀百姓言功章闕信儀收怪章扶衰章斷傷章斷官章大斷骨血注代命章斷土章拔厄章救難章斷墓章斷子注章解一身羅網章拔墓章拔天河章拔三十六獄章初化除罪章求子章夫妻積病療治章産後疾病首罪乞愈章夫妻興氣相應首過章暴病請官一時相付章家道轗軻絶子請宅乞祐章宅中光怪歸命乞丐白章疾病牒所犯移徙諸忌請官救章疾病歸化心口有違攺更乞恩章請官收捕妄作一法章夫妻離别斷注消怪章違犯科要首謝乞原章巳上二十七章皆闕文右同用白素四十尺白米一石油一斗香一斤紙一百張筆一雙墨一笏書刀一口席二領布巾五尺憂厄困辱謝過解咎章金鐶一雙書刀一口紙一百幅筆二管墨一笏米五斗席二領香五兩始覺有疾首罪乞恩章錢百一十米三斗紙百幅筆二管墨一笏香一兩席一領書刀一口疾病累日謝醫救治章紙百幅筆二管墨一笏書刀一口米三斗香一兩席一領錢一百二十文斷瘟疫章紙百幅香三兩筆一管墨一笏書刀一口席二領油一斗錢七十文繒一丈二尺隨家口多少各别請雨章油三斗六升筆二管墨一笏紙百幅米砂一兩香三兩席二領米五斗錢三百六十五文疾厄斷除鬼訟拔危保安章𥿄三百張油三斗青絹四十尺筆一管墨一笏香五兩米五斗席二領書刀一口解九五元辰厄㑹章白米石二席四領油一斗二升絳繒一疋無者用紙百張筆二管墨二笏書刀一口算子百二十金鐶一雙香二斤絳繩三種毎種九條百二十尺厄重者五色絲各三兩請晴章蠟五斤筆二管墨二笏紙百幅朱砂五兩書刀一口席二領米五斗解八卦元辰大厄章白素四十尺米一石二斗油一斗二升書刀一口素絲五兩金鐶一雙重二分錢一千二百亦可六百或三百八十四文算子百二十紙百幅香一十三兩筆二管墨一笏席二領書刀一口退盜章五色左繩隨方丈數青紋九十尺大刀一口紙一百張筆墨一副香三兩席一領書刀一口米五斗入居改易不利大小謝宅章紙百二十張筆一管墨一笏書刀一口五方綵各隨方數蠟五斤席二領米五斗錢百二十文香三兩新居恐懼鎭宅章黄繒十尺錢百二十文米五斗席二領紙百幅筆一管墨一笏香三兩書刀一口虚耗光怪斷絶殃注章𥿄百張筆一管墨一笏書刀一口席一領油一斗黄布一十四尺白米石二香二兩解釋三曽五祖塜訟章术五十斤燒及作散法在後十五斤二十五斤亦得黄布五丈米一石五斗紙一百張墨一笏筆一管香一兩席一領官私咎謫死病相連斷五墓殃注章紙百張筆一管墨一笏書刀一口席一領油一斗黄布二十四尺米一石二斗朱砂一兩香一兩數夢亡人混渉消墓注章黄布五丈白素四十尺油三斗六升紙一百張筆一管墨一笏書刀一口香三兩朱砂二兩宅中怪異小驅除章紙五十張筆一管墨一笏米三斗席一領香一兩錢七十二文喪葬後大驅除章紙一百張筆二管墨一笏書刀一口香一兩席一領米三斗錢百二十文朱砂一兩繒十尺病死不絶銀人代形章銀箔人隨家口多少一人一形銀無用錫人或錢九十九奏章後投水中紙百張筆一管墨一笏書刀一口米五斗香二兩繒一丈一尺疾病多怪收捕