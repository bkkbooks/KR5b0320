front:
  text: 赤松子章曆卷之一豈一謹按太眞科及赤松子曆漢代人鬼交雜精邪遍行太上垂慈下降鶴鳴山授張天師正一盟威符籙一百二十階及千二百官儀三百大章法文祕要救治人物天師遂遷二十四治敷行正一章符領户化民廣行隂德爾後年代綿逺寳章缺失今之所存十得一二又按赤松子問天老平長已丑上章何不報平長答云見扶章齎到天門門閉復問一日一夜何時開何時閉平長具答悉如科文且世人求貢章奏或爲家國或爲已身或爲眷屬或爲先亡種種不同具如分别又云人生年命悉有星宿管係若爲惡事記名黒簿令人精神恍愡夢寐不安旣多迍邅更減年算若清心信向之士崇尚道法求乞章符奏即罪滅福生増添禄壽先靈遷逹願念從心凡曰奏章先須備信神明鑒燭冀質誠心若都無信即神明不納責子有慳鄙不捨之心又云章無的信富饒者増之貧窮者減之或有官髙富足之家心希功德而恡惜財物便效貧窮之人出信如此亦無益於有爲科云有寒棲貧乏之人求請章醮師爲代出法信舊章雖各具所用大抵有三天子王公庶人且尊早不同品目各異不可殽混而無分别科云章信之物施散貧窮宜行隂德不可師全用之十分爲計師可費入者三分而巳天科嚴峻犯者獲罪於三官殃延九祖永爲下鬼可不愼之令並次比具有條貫冀行之者知次第焉章信天旱章
