body:
  text: 受道倍日正月二月子日五十倍丑日四十倍寅日殺子卯日殺妻辰日大凶巳日自如午日七十倍未日殺身申日殺父酉日殺子戌日七十倍亥日五十倍三月四月闕注五月六月子日殺子丑日大凶寅印日凶辰日五十倍巳日殺子午日自刑未日殺婦中日殺父酉日五十倍戌日二十倍亥日不吉七月八月子日五十倍丑日大吉寅日大凶卯日殺毋辰日大凶巳日四十倍午日殺子未日五十倍中日三十倍酉日殺母戍日二十倍亥日五十倍九月十月子日自如丑日五十倍寅日凶卯日二十倍辰日七十倍巳日大凶午日殺子未日二十倍申日三十倍酉日殺母戍日殺子亥日殺婦十一十二月子日殺子丑日殺子寅日二十倍卯日五十倍辰日五十倍巳日殺父午日殺婦未日七十倍申日三十倍酉日三十倍戍日大凶亥日殺婦書符式凡欲書符先向王方叩齒勑劒水存七星呪噴了啓曰元命真人唐葛周三將軍今有男女某甲疾病告訴向臣求乞救護臣謹依道法以道真符與某甲吞帶當願勑下真官直符使者百千萬重道氣隨禁降入符中行神布氣搜索邪精誅戮鬼賊救濟天人次存思案前五色真氣真氣上左右有直符童子朱衣青裙案前有一行符將軍朱衣玄冠佩劒持鉞斧左右各有一直符黃冠黃裙緋褐執劒我面前有左日右月去面九寸日月光芒履朱盞頭上七星星在頭魒在朱盞上畢口三云合明天帝日了存朱筆為螣蛇便閉氣書符凡書符之法先以青墨郭外四周乃以丹書符文於內若無青墨丹亦可用苦書治邪病符當用虎骨真朱合研研畢乃染筆書符呪曰謹勑臣身中五體真官魂為天父魄為地毋頭為雷公髮為黑雲頂為明星腦門為朱雀眉為箕麟眼為日月鼻為虎賁上脣為風伯下曆為雨師舌為九州都督喉為九層樓臺左頰為東王公右頰為西王毋耳為仙童逺聽項為天柱肩為金剛肘為力士左臂為璇璣却狄大將軍右臂為玉衡破狄大將軍掌為火車指為甲卒肝為青帝肺為白帝心為赤帝腎為黑帝脾為黃帝腸為黃龍膽為太一膀胱為河伯血為水官筋為天網骨為地網毛為天羅足為白馬前步三官各領七千萬衆乘駕大車並從臣身中出助臣書符行氣破殺凶魔魍魎魑魅惡鬼邪氣急急如太上口勑律令甲子旬治病使者領氣功曹子時太上還治甲戌旬治病使者治病功曹戊時太上還治甲申旬治病使者治病功曹申時太上還治甲午旬治病使者正一功曹日中太上還治甲辰旬治病使者中部功曹食時太上還治甲寅旬治病使者直使功曹平明太上還治右凡書符取此時乞願符禁迅速書章法書章筆硯勿雜用研墨左轉四十九重磨亦然以聞去再拜下一寸臣姓去以聞隔三行太清去臣姓三行太歲去太清三行若書章巳成而有小事經年不可上若未下細字經月可上細字上度三寸五分中度四寸五分下度五寸不得過此今人多言一寸五分非也章至太歲紙盡不可上若有主行即可若兩行可全紙續之錯誤脫字小章不過三字大章以意量之書章上讓八分下通蟻走書車以巾敷案上不得令著牀勿以衣著章上及落地書章入靜不得常人亂閙論及他事臭穢之言書章不得以筆㸃水中及口當閉口不得有所食及氣衝書章淨洗手向北書身經殗穢不得書章書不得敗字不成紙不得破裂不得飲酒食肉薰穢當整理衣冠不得祼露書章當須匍匐恭敬不得蹲踞書章畢先校讀一遍然後奏之臣字不得上行頭不得懸生露死鬼字不得居行首不得抽破人姓名不得今人竊讀觸動太清日月下得預下當在臨時若急事上章當用朱筆題署若上逐鬼章當朱書所上正一弟子姓名苦治邪病章用青𥿄三官君吏貴在青色若疰氣鬼病作繫鬼章朱書青𥿄章奏了於治中燒和真朱二分搗和蜜為九平旦入靖再拜服之垂死皆活莫令人知若因病入靖書章即四面燒香火三元日正月十五日上元七月十五日中元十月十五日下元右件天地水三官檢校之日可修齊祈福三會日正月五日上㑹七月七日中會十月五日下會右此日宜上章言功不避疾風暴雨曰月昏晦天地禁閉其日天帝一切大聖俱下同會治堂分形布影萬里之外響應齊同此日上章受度法籙男女行德施功消災散禍悉不禁制又女青鬼律云天會丙午地會壬午人㑹壬子曰㑹庚午月㑹庚申星辰㑹辛酉五行會甲辰四時㑹甲戍天節甲午地節甲申人節甲子右巳上日可立功德乞福大吉子時相破子時破午午時破子凡啓醮宜用子午二時若值相破及斗擊在子須避子在午須避午若急疾亦得或避得為佳奏章向背日中奏章向東夜奏向北又云白日受度向東破契子午請命星宿急疾章皆向北存大帝自非星宿大章登壇大事并收捕驅除急章不煩露上治病向鬼門消災厄向地户求長生向天門求富貴財利向地户消口舌呪詛向人門厭虎向寅地厭蛇向巳地又曰作福延年消災厭病宜東向解墓隂責開心聰明過度災厄宜西向疾病垂死章符治救宜北向治身飬命求乞富貴宜南向上章謝罪宜北向正月五月七月九月治病不向束四月入月十二月治病不向南七月三月十月治病勿向西二月六月十月治病勿向北右巳上向背章符治病不得越錯如違依科奪算逐月詣官正月十二月上詣太上虛旡丈人宫二月上詣太上玄老仙都宫三月四月上詣太上三天太清宫五月上詣太上重道宫六月七月上詣太上九氣文昌宫八月上詣太上天帝宫九月十月上詣太上大道宫十一月上詣太上侍中左右監神諸將軍宫閠月隨可宫上詣太上金單太嵗宫或隨前月逐日詣曹一日建王曹治赤虛宫二日太素曹治太微宫三日太微曹治北平宫四日都正曹治太清宫五日正一曹治東明宫六曰玄一曹治上明宫七日太素曹治髙靈宫八日靈集曹治紫微宫