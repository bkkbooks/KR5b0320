之若欲學神仙而轗軻疾病注連沈滯請虛素天精君赤衣兵士十萬人在天柱宫以制鬼滅禍却赤天之氣若家有惡鬼不肯散故為者請赤天食氣君官將百二十人治之若家中𡒄坎不安夢寐亂錯魂魄不守請收神上羽君官將百二十人主治之右請官治病以應二十四神身中之宫也官將及吏兵人數悉道家三氣應事所感作也非天地生人也此精誠發因物致感所以氣作而成吏兵也其餘官號在千二百官儀此二十四正號以應體中二十四神有急當隨事稱之皆驗也亦可入靖燒香口啓四方請求救也封章法几章讀了置奏案以書刀朱筆鎮上次操復畢如法緊卷以香度過仍以全紙封之題云謹謹詣虛旡自然金闕玉陛下下具所受法位泰玄都正一平氣係天師陽平治左平氣門下版署三品大都功兼左廉察祭酒赤天三五步綱元命真人臣某謹封次入函以青絲三道纏然後以蠟填印池用九老仙都之印印之次以青紙外封先以朱㸃上下不得顚倒然後封兩頭題作全字朱書各以印印之外封題云奉為大道弟子具官銜姓名為某事請拜某章若干通謹詣三天門下請進三天門下字須平寫請進字於三天門下側注次題法位如前某甲謹封謹封處以印印之殗穢科曰家有死亡無論大小婦人生産大喪殗一百日生産女子傷身殗一百日入産婦房殗三日小兒及奴婢死殗一月六畜死殗一日在外即無殗朞喪四十曰大功緦麻月內殗出月即解往喪家哭泣其曰殗久喪無殗喪家祭食産婦三日及滿月之食並不可喫右巳上諸殗不可修齊設醮上章如在别處遇者但以符水解之存思科曰操復畢便於案前伏地便存赤紅氣從巳心中出上升天俄頃如經歷百里赤紅氣路蕩蕩兩邊無瑕翳惟多寶樹忽見一黃道即日月黃道也直過黃道五六里遙見紫雲隱隱直到柴雲見天門門度一丈八尺諸侍衛悉住唯與周將軍及直使功曹傳章玉童擎章表至闕門之下西謁見正一三天法師姓張名道陵載拜訖具陳章表事由天師九拜即往鳳凰閣門之下入須㬰有一仙童朱衣玄冠出就傳章玉童手中接章表入少頃復出引入見太上太上著九色雲霞之帔戴九德之冠當殿而坐左右二玄真人侍衛又見太一著朱衣玄冠呈太上章表太上一覽太一承太上意署太清玉陛下作依字了又見一仙童收章表於右陛分付今日日直曹官使心載拜辭太上出門又載拜辭天師同奏章真官抃躍而回至奏章之所便起稱以聞要安吉凶要安日章醮諸天來降生人受福大吉玉堂曰章醮諸天歡樂福慶延永大吉金堂曰章醮諸天降靈延年益算大吉龍虎日章醮諸天不降少福罪至日章醮諸天煩惱有理不申大凶敬心日章醮諸天歡悅神靈鍳納獲福普護日章醮諸天降福福慶甚多福生日章醮諸天並集欣悅大吉受死日章醮諸天書罪主人受殃大凶聖心日章醮諸天校福延益之日大吉益後日章醮諸天喜樂開度萬民大吉續世日章醮諸天開泰求乞得福右要安等曰以十二月傍通逐月看十二辰即定知吉凶日正二三四五六七八九十十一十二要安寅申卯酉辰戍巳亥午子未丑玉堂卯酉辰戍巳亥午子未丑申寅金堂辰戍巳亥午子未丑申寅卯酉龍虎巳亥午子未丑申寅酉卯戍辰罪至午子未丑申寅酉卯戍辰亥巳敬心未丑申寅酉卯戍辰亥巳子午普護申寅酉卯戍辰亥巳子午丑未福生酉卯戍辰亥巳子午丑未寅申受死戍辰亥巳子牛丑未寅申卯酉聖心亥巳子午丑未寅申卯酉辰戍益後子午丑未寅申卯酉辰戍巳亥續世丑未寅申卯酉辰戍己亥午子藏章故本太真科日為人奏章竟諸小章復爐畢即卷付函齎出别舉諸大章一時取之舉録如法若應燒者復爐前燒之若在他處將章歸題署封緘不得泄露蟲鼠及貨易取利違太上勑命蓋章中有真官位號鬼神姓名靈祇祕訣不可汚辱章皆有正本傳為校定分明切不可用故本事狀不同謮宫殊異俗人家不得輒留章本違犯五刑論斷章太真科云上言謹按文書臣某治依法修行宣揚道氣請召真官救護萬姓所奏章表應燒不燒者緘封箱閣卷束積多法不得散恐蟲鼠所犯漏濕爛敗有所遺落從來謹遵不敢違㫖即日依科隨斯斷奠自某年月日合有如干通於某淨壇淨處火化煙通升靈降氣布吉除凶謹請直使正一功曹治中虎賁威儀銓下伍百各二人校尉十二人功曹主簿幹佐小吏金光童子各五人中部章督郵從事使者各二人同時監臨對共料省焚除塵故采納光新原赦臣某愚短不及之愆乞前所印寫永登天府後所奏聞悉免寒池諸官證明奬助有功依都章言功不負效信恩惟太上分别求哀斷章通數不同蓋時有豐儉法有行藏藏時少行時多計滿百通為斷如前文每年至十月為斷奏章案案長二尺四寸闊一尺二寸髙八寸仍須曲腳以柏木楠梓為佳今人多用髙案直腳者此並非法違科奪算天老問三皇天老問三皇曰何以用戊戍作符三皇對曰戍者天門也戊者土中官君像也天帝常以戊戍日從天門來遊觀見此日作符歡悅賞賜所願戊者土也必得官爵封侯食土邑矣用午時佩之午為太陽之精純金之光也金紫髙位之像避忌科曰上章醮弟子不得殺生違減算二紀上章家中大小雞犬不得喧雜違罰算一紀大風大雨連綿風雨不得上章違罰病一年身有六疾不得與人上章違奪算三紀上章不得食酒肉五辛違奪算一紀禁戒禁曰上章宫曹請官不得越錯犯穢不得入治見殗不得入江河山林藪澤六畜生産未滿七日不得入治小兒未滿百日不得入治六畜生子未滿月不得入治章醮信物不得假借於人不得於治中燒諸臭穢毛羽皮角入治皆須恭肅禮拜不得傲誕入治不得指斥形容妄說非法言語戲笑治中不得祼露形體𧵥信當須散於道民詣治請章救度疾厄當須束帶履版恭敬叩頭自陳本末不得傲誕狠戾髙聲自貴犯三刑論令曰父有疾厄兒受天師大治在身父當冠帶巾褐叩頭摶頰子方入治奏章令曰父子求請不如法父子犯三刑論兄弟如上令曰婦受治職夫有急厄當須束帶履版叩頭如法婦乃入靖奏章令曰夫請不依法坐二刑論婦宣令不明坐三刑論令曰親伯叔疾厄子姪治籙在身求奏章如父子法令曰舅姑姨疾厄請子孫上章如伯叔子姪法令曰凶逆之人手行誅戮謀君殺父此罪大逆非財貨之功所能補贖當履刀山𧢻劒樹經鑊湯被燒煮萬載不原難以拔贖禁律曰人身中常有司過之神隨時上下曰以善惡過滿百二十為一刻刻者令人多害少利百八十過為一耗耗者令人六畜不繁息十過為一遍遍者令人疾病五百四十過為一凶凶者令人損胎傷子七百二十過為一吹吹者令人死七百二十九過為一殃殃者令人瘖啞盲聾千八十過為一禍禍者令人暴夭死亡千二百過為一殘殘者令人出逆子千二百六十過為一咎咎者令人絶嗣千四百過為一基基者令人殃流五世千六百二十過為一謫謫者令人斷世無後嗣千八百過為一患患者令人家出顚疾狂癡二千六十過為一暴暴者家出兵刀逆死二千三百三十過為一虛虛者家出父子兄弟相攻伐二千五百二十過為一曽曽者家犯肌膚惡疾二千七百過為一害害者家出聾二千八百過為一災災者家出骨肉淫亂悖逆三千六十過為一異異者家出青盲隂殘三千一百三十過為一變變者家出獄死族誅三千一百五十過為一怪怪者家出都市乞丐人骸骨棄捐三千六百過為一滿滿者應死也律曰人生或年二十三十刻滿凶夭或五十六十而刻滿凶夭或小來無遏而今夭者此受先世餘過或妄行惡逆竟壽而不遇禍患者受其祖餘慶也故積德之後有餘福積惡之後有餘禍故人能悔過過滅福生當思愆自責攺而勿犯行之一旬其人身中司過為之除一刻行之百曰除二刻行之一嵗除三刻行之三年其福自應如不思不悔其過日深小過止其身大過下流子孫積善如梁上塵積惡如突中煙可不明愼之哉受籙吉辰甲子丙寅丁卯辛未壬申癸酉乙亥丙辰辛丑丁未庚戍戊午庚辰巳上是義日甲午丁丑丙戍庚子壬寅丁未戊申巳酉辛亥癸卯丙辰乙巳丙戍丙辰巳上是寶日已丑戊戍丙午壬子甲寅乙卯巳未庚申辛酉癸亥戊辰丁巳丙辰乙未巳上是專日右義寶專等日傳受經籙吉日亦具受道曆相刑自刑日子刑卯卯刑子已刑申申刑寅寅刑巳未刑丑丑刑戍戍刑未辰午酉亥自刑右四辰自刑章醮切須看之赤松子章曆卷之二
