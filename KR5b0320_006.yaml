body:
  text: 沐浴章具法位上言謹按文書右牒即日稽首仰慮亡人在生之日多諾罪纍沒命之後囚閉三官困苦之中未蒙解脫今謹憑大道之力拯濟幽魂宿業愆尤以今蕩滌謹賫亡人在生衣物及鎮信錢米香油方綵筆墨等謹於淨庭立作浴堂沐浴之具皆令清淨免離幽塗臣今謹為伏地拜章上請沐浴君吏沐浴夫人洗浣玉女千二百人鍳臨亡人沐浴身形洗垢除穢去離桎梏得覩光明逍遙快樂衣食自然無諸乏少安穩塜墓祐利生人以為效信恩惟太上衆真分别求哀臣某謹為拜上天官沐浴朱章一通上詣太上某宫曹治云云解謫章具法位上言謹按文書右牒即日稽首仰恐亡人在生之日所向多違招延不利凶被亡人遂爾終亡如此苦切人天罕測罪積玄司釁彰天府亡者平生之日三業六根多諸罪結上觸天禁下犯地忌中誤人鬼有諒罪深不測魂路遂即一心歸命大道告訴向臣求乞章文具如所列臣謹為伏地拜章上請素車白馬將軍兵士十萬人又請太玄君一人官將百二十人一合來下主為亡人魂爽永離三塗名書六天願為度脫重罪請太玄真符告下天地水官府女青詔書地下二千石丘丞墓伯十二塜神泰山二十四獄東嶽泰山地獄中都大獄天一北獄皇天九平獄南嶽衡山地獄西嶽華山地獄北嶽𢘆山地獄中嶽嵩髙山地獄北都寒池牢檻之獄九江水帝河伯將佐掾吏一切放遣亡人永離幽塗升遷福堂衣食自然不得注訟生人恩惟太上分别求哀久病大厄金紫代形章具法位上言謹按文書具銜某年若干歲某月日生行年到某今於某州縣鄉里觀院謹奏金紫代形章一通某爰自幼小以至于今無德無功叨榮重祿歲月積久罪咎彌深又職在養人政專撫俗或緣情喜怒傍公徇私或率意刑罰誤犯真聖失在毫末釁重山嶽常懼冥責唯無覺悟某自某月巳來災疾云云伏惟大道潜貸有感必通某微誠上陳伏希降鍳謹依儀式賫金人一形紫紋若干尺隨年命米一石二斗鎮錢一千二百文油一斗二升紙一百二十幅筆兩管墨雨鋌青絲一百二十尺算子一百二十條淨巾一條用為法信上投大道求乞章奏削落死籍注上生名臣謹按師法參詳天圖某受生九天冠帶五常九宫籬落八卦交纒三光朗照七元輔身乾坤覆載五氣翼形隂陽育養開導光明法象天地名參中元司命勒籍太一檢年玄符記録在南昌上宫紫蘭之內玉𠕋七寶之函承天順地禀氣玄天定算冥中初無天傷今世運否三元交喪真氣上升六天鼓行千精萬邪枉害生民致有理不揚抱枉不彰三尸枉魂飛爽彌天怨鬼號訴稱恨三官天髙地邈幽冥不理注連生人致有先亡祖考中外傷精搆合為凶臣按天師九道考經元辰包鉤命訣之法人命受生有吉有凶修短之期各有歲月日時生值吉德則長享五福犯刑遇害終於六極謹尋某本命某某命人以某為鬼行年某災厄深重云云伏聞大道普慈好生惡殺無災不救無厄不解既生當活巳成當蓋哀念一家愍其厄疾臣忝任治職奉宣慈化不勝所見謹冒清嚴披露丹懇伏地拜金紫代形章一通上聞伏惟太上無極大道太上老君諸君丈人天師女師三師衆尊乞垂大恩特賜原赦解某宿對之𠍴千罪萬過道氣廣覆回育養之恩救濟一切賜續壽命身入福德之中以上官典者垂神省理分解年命生月胎日宿新災厄凶禍之氣隨事和解為某上請三十二天帝君長生司馬代形度命南昌元君監生使者各三十二人乘飛龍羽車三十二天帝兵馬各九億萬人一合來下賫某金人紫紋上詣三十二天曆星檢宿宫曹之中貿名易形更請真神玄元生氣下入某身中更注上生籍延命無窮謹請延年益壽君各五人官將一百二十人一合來下賫某代形金人紫紋信物上詣太清玄元生氣宫伏請下條星度算君貿名易形君脫死上生君又請臣身中功曹使者太隂考召君吏賫某代形金人紫紋上詣北斗太隂御女下一重冥宫太隂典死籍庫璧匱之中貿某身名易某身形上名生籍玉曆之中延命無極又請魁𩲃君五人官將百二十人太皇萬福解患君五人官將百二十人三天解厄君解害君各五人一合來下主為某上解生年日月胞胎所犯日月五星二十八宿醜星惡宿下解地祇禁忌五災六害七咎八難九厄十苦十二刑殺願北斗七星削除某死名貪狼臣門斷絶死源祿存廉貞貿易死形文曲武曲除籍死録天綱破軍殺氣不加願三台君解某行年六害過度疾病死喪之厄嵗月日時之厄天地之厄牢獄之厄兵賊之厄四時五行金木水火土之厄千凶萬厄盡乞度脫請煩東極青華九玄上宫青帝監生度命君貿名易形君神仙度世君各一人兵士各九百萬衆乘青雲羽車飛行萬里一合來下賫某代形金人紫紋上詣長生宫中為某貿名易形更上生籍玉曆之中青帝冠帶延命無窮重煩南極南昌宫中赤帝監生度命君貿名易形君元氣受生君神仙度世君各一人兵士各九百萬衆乘赤雲羽車飛行萬里一合來下賫某代形金人紫紋上詣南極長生宫中為某貿名易形更上生籍玉曆之中赤帝冠帶延命無窮重煩西極白素宫中白帝監生度命君貿名易形君元氣受生君神仙度世君各一人兵士各九百萬衆乘素雲羽車飛行萬里一合來下賫某代形金人紫紋上詣素雲宫中為某貿名易形更上生籍玉曆之中白帝冠帶延命無窮重煩北極玄斗太隂宫中黑帝監生度命君貿名易形君元氣受生君神仙度世君各一人兵士各九百萬衆乘玄雲羽車飛行萬里一合來下賫某代形金人紫紋上詣太隂御女下一重冥宫中太隂典死籍庫璧匱之中為某貿名易形更上生籍玉曆之中黑帝冠帶延命無窮重煩中央髙皇三十二天玄都紫微宫中黃帝監生度命君貿名易形君元氣受生君神仙度世君各一人兵士各九百萬衆乘黃雲羽車飛行萬里一合來下賫某代形金人紫紋上詣三十二天始生元氣宫中為某貿名易形更上生籍玉曆之中黃帝冠帶延命無窮謹請某本命某并從官某人千乘萬騎為某保守祿命拘制三魂滅除九氣易形生神安鎮宫府長生無窮又請某行年某并從官某人千乘萬騎為某保延祿年拘制魂魄削死上生安神定氣永鎮生宫之中願真君父母為某上消天上四方星宿之災下散地上八方之禍各保某祿命上詣三天曹解某身中真官考召解脫羅網削死上生移名玉曆生録之中轉禍為福轉凶作吉以德消刑以福消禍四時五行金木水火土雖復相殺還復相生戊巳中和神仙道成願左右玄元始氣生活某若犯天地水三官殃考應還鬼伍者願三台君解除億基萬考千咎百禍十凶九厄三災八難之中特為解救增益算壽更著生録願明曹典者尋拔十方之內某所犯宿連罪命衰厄所在悉為隨事和釋於三河四海九江八極天地水三官百二十曹府六律九章泰山二十四獄玄河北獄之中拔贖某三魂七魄女十四魄還附身形又請三天拔命君度厄君度命君濟厄君各十二人消災散禍君十三人倉穀吏樹木嗇夫二十八宿三百六十五度周天八極君十二人左右執法君十二人官將百二十人河畔六府河伯水府解厄掾吏三百六十人又請中宫間能兵士百萬人一合來下入某身中消除行年本命十二禁忌衝破拘元檢敗大㑹小㑹五刑九厄五凶六害九醜衰厄安定五藏調和六府百病除差又請周鼎君一人治大夫宫中為某和解曆紀周旋八極除死籍上生名超百二十生氣延年不老又請南上君一人官將百二十人治列庫宫周玉君一人官將百二十人治地理宫中衣綵朱袍丹陽之幘通天之冠又請周鼎玉女千二百人衣綵衣一合來下為某致舍生之氣延年度厄召還魂魄附某身中記生名除死籍乞生活章上所請千二百官君將吏兵并勑下某身所住所居里中監察真官四野九野都平君道上二玄三元四始甲子諸官君十二水帝河平侯所在神祇社稷咸承臣今章御之後乞某災厄過度年命延長四大休吉道力扶持元元安穩以為效信恩惟太上分别哀原臣愚謹因二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏飛龍騎吏等各二人出操臣謹為大道弟子某奏金紫代形解厄延命大章一通上詣太上某曹治收魘夢章具法位上言謹按文書某列訴千生有幸得在道門以自保持被蒙恩覆闔門端正毋自喜樂但以肉人奉法初淺𠎝咎纍臻某自近巳來寢卧不安眠則魘魅又夢寤參錯多見先亡後化往來輒便驚魘大小惶怖依慿大道請治告臣求乞章奏以自救護謹為拜章上聞願乞大道哀愍肉人解除殃害若有故氣太嵗太隂大將軍此時司命十二月建前後八神拘刑破殺宅中伏龍七獄掾吏遲留逆殺四面蜚功懸尸六害十二下媚及客鬼寄住之氣盡令消散謹請萬神君五人官將百二十人主為某却死來生却禍來福辟斥故氣精祟注鬼重請天昌君黃衣兵士十萬人主收某家中外强𦍙十二刑注夢寤之鬼重請太陽君一人官將百二十人治佐蘭官主治眠卧不安驚怖之鬼皆令銷却若有塜墓十二塜訟强𦍙復連一切盡以三氣除之解絶復連不得為後生人作精祟重請天中敢健吏兵君官將百二十人主收捕某家先亡遲留逆殺考害之鬼付女青北獄治罪某身中所苦悉令除差卧得安貼不復驚魘恩惟太上分别求哀為亡人首悔贖罪解謫章具法位上言謹按文書某乙素以下官子孫運㑹有年遭逢大化操信制屬以自保治蒙恩覆蓋大小慶慰而以頑愚修奉多違以招考罰頃來轗軻凡百無善某身疾病從來云云伏自考思精祟所由恐亡人某生時犯罪不忠不孝不仁不慈淫情嫉妬罵詈呪詛牽天引地呌喚神靈或貪財盜竊枉剋非理攺動所作凡百無善致收大考繫身后土恐亡殁之後被受重謫魂魄考對結在三官徒刑作役楚毒備至不堪困苦逮纍生人致令某家基考復注殃禍不絶生死困辱不自解免元元之情慿恃道氣某今備條某生時罪狀首列詣治并賫某物以立心信拔贖某生時所犯百萬之罪臣以頑暗不明鬼氣謹承某辭伏地拜章上聞唯願太上大道天師門下典者特垂愷悌之恩察臣所奏乞依太上首悔之制為某家亡人某隨事和釋解散考謫重遣功曹使者賫某信儀遙詣三天曹按某生時所犯隨原料剔削除刑名絶滅事目謹請太玄真符攝下女青詔書地下二千石丘丞墓伯十二塜神泰山二十四獄中都大獄天一北獄皇天九平獄天地水三官河侯河伯將佐掾吏等一切放某等魂魄使還附尸骨免離囚徒困苦之中得上屬天曹和樂之地斷絶殃注滅除死籍若某生時有犯五盟七詛更相拘牽結逮不解者某乞丐一切解罷釋散某家從今以去令生死安穩門戶隆利疾病除差以為效信恩惟太上分别求哀賫亡人衣物解罪謫遷逹章具法位上言謹按文書某列素以胎生肉人下官子孫千載有幸得奉大道兼蒙恩育賜某大小百官重籙參佩內外光顯非分實荷罔極但某等肉人生長季俗不能承科奉戒多違招延考罰亡過某前得疾病不蒙原赦以某年月日謝命三官從此巳來疾氣云云恐某先身宿緣及在世之時所行罪惡新故乘釁及存亡考負魂魄繫對在三官困苦之中不堪憂惱注逮生人某大小痛死憂生無復情計不知立何功德以相拔贖謹賫某生時服飾某種衣物以贖某死魂重謫斷絶復連歸命告臣求乞章奏上如所列臣以大道慈化憐生愍死歸向之民存亡戴賴最以幽縶之魂有升遷之慶法輪開度化生人道某丹心惻盡敢緣慈恩仰希照潤謹冒清正拜章上聞唯蒙太上無極至真申臣所奏原赦某先身今世特垂料省謹為上請素車白馬將軍兵士十萬人又請太玄君一人官將百二十人主知某魂神閉繫所在若長淪三徒名書六天願盡為度脫重請仙官大歷君官將百二十人治西水宫重請太玄真符告下天地水三官女青詔書地下二千石丘丞墓伯十二塜神泰山二十四獄中都大獄天一北獄皇天九平獄東嶽泰山地獄南嶽衡山地獄西嶽華山地獄北嶽恆山地獄中嶽嵩山地獄北都寒池牢檻諸獄九江水帝河侯河伯將佐掾吏等一切放某魂魄削去罪目解除刑名放囚出徒沐浴冠帶遷升福堂反胎化生還於善門絶死注於六官上生名於丹籍賜某等大小所苦並蒙除愈口數無他向願從心以為效信生死千罪萬過唯乞原赦恩惟太上分别求哀滅度三塗五苦鍊尸受度適意更生章具法位上言謹按文書臣以凡愚先身功微雖生人道履於穢世塵濁所染自分淪胥絶望天路皇極哀矜未見刑辟窺𨵦僥幸得參三景真經雖志自克勵而為尸蟲所纒纍在嗜欲觸事違戒加值今陽九運促驅除巳及功沒罪見未能自拔常懼一旦奄忽無期雖念自新而結縳未解善緣未至敢以刑餘之命於三掠之門冒陳瞽誠干忤天真追念悚息臣某等誠惶誠恐頓首死罪死罪臣竊見經㫖明戒有可憑恩經言自非先身有善纍劫之功名書瓊簡不得妄見寶經預以見者皆應升度或功德未足生死未充未得白日飛騰或託尸解暫經太隂魂神受對寄形地官因緣期訖得還故宅一時俱升如靈㫖所誡則奉法者猶有可冀是以愚臣敢申所見即日有某郡縣鄉里某年如干嵗本命某甲某帝領籍某月生受命某天某在世之時窺𨵦好慕詣道士某登壇結盟奉受三景洞經供養禮拜時修齊直但某身履下世穢濁所牽功德未滿滅根未絶如靈㫖所期某雖形滅應在尸解恐某因緣未定先功未充以某月日時以疾去世託滅太隂形寄土官今停柩殯宫須待良辰遷還蒿里功德未足未便早遷恐為土府所見驅逼不相容安魂飛魄揚尸形匪寧搖動考對注連復生臣宿世因緣與某忝結天親俱處末俗私心憂念雖靈契有定臣猶不自安嘉荷任之日以開度為先今仰憑無極天尊元始大化明真之㫖正一之科謹為攝齊拜章上聞願大慈哀矜原除某前身及在世時所犯罪釁諸有三塗之根五苦之結在三官九府考屬執罰之曹神兵力士鎚杖之下刑係刀山劒𣗳九幽長夜地獄之中者乞申臣今章告下三官賜以某生時建善之功拔度魂神還復故形若某神離魄蕩尸肉朽腐願五帝尊神還其肌膚養復魂神三光飲哺注以洪泉通其榮衛潤以血氣應轉者轉應度者度應生者生願某所屬某嶽某山真靈正神為符下九土地官各依部界供給有無一如明真科㫖當使形安神守魄不蕩散頓消罪源精神還復故宅乞臣章御之後某復受生錬尸還復故形上𥙷真仙伏願太上門下典者申臣翹翹之心所奏蒙御開度幽冥上願天慈造化無量大恩下使臣愚念不辜恩惟太上分別求哀云云為某拜上滅度形神拔出三官九府三塗之根五苦之結開九幽地獄還復魂神鍊尸受度適意更生章一通上詣太上某宫曹治伏須告報出喪下葬章具法位上言謹按文書某列奉法無狀招延凶考亡人某以某年月日沒命三官安喪宅內某地未得葬之當以今月某日某時權移某尸樞從某地出安埋某處某奉屬清真委誠道氣不復從師卜問懼為太歲將軍十二月建鈞刑破殺下官故氣千禁萬忌所見傷害求臣上聞以自防護臣按某為道民事與俗殊送終葬死無所忌諱一必之民在可哀愍謹請太素太始君五人官將百二十人又請葬埋吏十二人一合下符攝下女青詔書地下二千石丘丞墓伯十二塜侯及所經由里域路次禁忌之官不得侵犯某家當令某潜寧后土精爽安穩附就魁綱衆忌一切消滅要以某家死生無他以為效信事訖言功恩惟太上分别求哀新亡遷逹開通道路收除土殃斷絶復連章具法位上言謹按文書某列素以胎生肉人下官子孫千載有幸得奉大道被蒙恩覆得全首領人口某等誠用欣慰兼蒙師道所見哀憐賜署某大小天官籙治荷恩隆重實在罔極肉人生長末俗不能勤修建立功德上報恩澤百行多違罪過山積招延考罰家門衰頓喪禍不絶亡過某前得疾病不蒙原赦以某年月日命謝三官從此巳來宅舍不安鬼氣不絶光怪夢窹疾病云云喪衰之餘懼怖屏營恐某等死時日惡殃注不己詣臣告訴求乞章奏上如所列臣按受隂陽造化而生雖承九天之業假備四大而成生時相給終畢相還隂陽相配雌雄相隨陽唱隂和男行女從三萬六千神眼為生宗受明日月卯酉二門在人為神去人為鬼人之將死故眼晴光墮左雄右雌名曰土殃從一至三雄白雌黃二七十四毛羽飛翔翅腳帶毒動則輝光口銜金殺向人皆亡東西緣緯南北乘經值遇太歲太隂將軍王耗之神住不敢行途路既塞恐成災殃有犯重喪奮羽吐毒注害生人死注不絶緣此而興又恐某屬三塗尸役地官搖動驅逼還逮生人臣以師道正一嚴明生死異世不得相干某生死氣逮注復相延如不解救則在沒莫分人命至重枉濫難容臣謹為拜章一通伏願師道必垂哀矜願請仙官討氣君一人官將百二十人主為死人某開通太歲太隂大將軍此時司命王耗千禁萬忌約勑四時之官開通道理不得拘留某精爽注復生人又請北辰司馬都官從事君一人官將百二十人誅殃君五人官將百二十人收捕某死時雌雄殃殺魁網之鬼復注之氣疾速去離某家各還本屬四時之官不得拘留原某前身及今生在世時千罪萬過千愆萬咎悉皆赦除某盟結既解遷達魂神去離三塗五苦還升福堂衣食自然利祐後人不得更相戀慕復連殃注於今斷絶地官衛尸神還更生並賜某家從今已去大小某等疾病隂私除差門户安穩生死受恩恩惟太上分别求哀新亡灑宅逐注却殺章具法位上言謹按文書某素以胎生肉人下官子孫運會有幸得染清化常蒙恩覆誠自歡慰但肉人闔門頑愚施行多違招致考罰頃年以來家居轗軻喪死相係某抱病疾以某月日死亡恐某死亡之日注復生人有土殃惡氣喪車𩲃雄雌之鬼盤停宅內傷賊不巳肉人惶悖無復心膽告訴向臣求乞請除宅中注殺安神定氣上如所列臣按人死之日魂魄流散化成八殺雌雄咎注喪車𩲃或出或上還重殺害纒綿宅內伺候衰缺復欲中傷注害生人謹為伏地拜章一通上聞特從大道回神降福流清蕩濁謹請天中敢健吏兵千二百人又請逐注鬼禽竒君水坦吏各一合來下某家宅舍之中收捕尸注鬼雌雄客殺喪車𩲃一切絶滅又請却殺將軍十二人一合下到某家宅中收却百二十殃殺之鬼并勑某家所居里中真官注氣并守宅三將軍二十四吏兵士三十萬人各竪兵刃外向繞宅三重又請神水使者與請官併力掃灑宅中神水雲行萬里清嚴宅內蕩除尸穢衆官備衛神明鎮守并遷某臨亡之時報殺將軍功成事訖各還天曹列受功賞并請安宅穩宅鎮宅清正吏一合下安鎮宅舍保護人口使復注絶滅肉人千罪萬過生死所犯一乞原赦恩惟太上分別求哀受官拜章具法位上言謹按文書某素以下官之餘胎生下愚遭遇開泰得在民次猥蒙天地重光之覆得預階倫昔處在某朝職滿被銓遷報某位王命巳行不敢稽闕當以某日拜受扳印仰憑大化清淳之氣奉發之日不問時王歸情師道告臣求哀謹為伏地拜章上聞為某上請朱雀君一人官將百二十人治洛平宫主萬民和合賔客人衆飲食皆令笑喜無有怨惡重請位官受爵君官將各百二十人重請四方夷蠻戎狄君官將各百二十人一合下營衛某受拜板印之後辟斥衆災禁害之氣使某職顯易遷居官淸利安穩無他以為效信所請君吏謁言上官中宫録署無今恚恨恩惟太上分別求哀臨官蒞民章具法位上言某以下愚誤蒙大恩為時所銓顯叙某縣王命既加當親民物便以時世僞濁人鬼互權肉人功薄無以禳災今月某日啓邁即路尅用某月日到境入界仰恃道氣不敢卜日問時入境之曰為土地精靈符師杜廟飲食故氣太歲將軍道上禁訶五行王相魁綱諸忌所見中傷告臣自列求乞防保謹為拜章願上官典者告下某里中土地真官郵書驛騎亭傳里邑皆為開通營衛某身重請昌落君一人官將百二十人重請祐護將軍萬福文人官將辟斥衆災解除禁害君一人官將各百二十人與四方夷蠻戎狄君吏各一合來下同共營衛某身太歲將軍四時王耗千禁萬忌使某到境入界安穩無他居官清利口數康靖在職遷顯嵗終如願時君將吏言功報勞恩惟太上分别永哀受官消滅妨害章具法位上言謹按文書某遭遇時會得在淸化身佩仙官出入蒙恩誠用光慰某從某世已來官爵相承蒙國重恩今忝某職以某日恭受王命溥倚大道不卜不問不擇日不揀時持心而行自受職巳來夢窹參錯疾病更互怪異妄生不知何由推按歲曆天地六甲受板日某子值五離本命某子行年甲午破子以十一月受板復是衰月太歲某刑殺在某墓殺在某某為刑殺更相衝尅時日所臨下值六合仍㑹六害伏聞大道無禁無忌精誠不至不能禳災却害馳來告臣求乞文書謹以上聞願以道氣下流謹為上請天閣君官將百二十人治安陽宫主開除九天禁忌某受命者消滅之請天王玉女千二百人衣青衣主收天下萬民拜官受位印金銀通神明却災除害身壽百嵗若某拜受之日為五離時有妖惡衆害悉為消滅乞上官典者差下所請某中如干政君若府云府中二十四政若郡云郡中二十四政若州云州中十八政縣云縣中七政君一合併力為某禳却衆惡消滅禁忌在官無他論議合德吏民歡心時蒙遷位嵗竟安穩如願之日所請天官言功報勞不負效信恩惟太上分别求哀遷臨大官章具法位上言謹按文書某素以胎生肉人枯骨子孫昔以樂化制屬大道以自保治蒙恩端厚常自喜慰某胄胤之門世以仕官為業纍為某官綜治王事名續顯著今還某職非某肉人所能披致仰感大道覆載之祐某官處在機要或在塞外云云職攝百國大政君臣多是强勢吏民權下悉皆習滑又多獄繫枉直難明懼文失中遭罹謹負歸誠大道廣納之施訴告向臣求乞文書以自保護臣忝荷重任不勝肉人告訴之至謹冒清嚴拜章上聞願垂矜祐謹請東九夷南八蠻西六戎此五狄君各十二人將吏兵士及時下圍繞某所住宅俠從左右重請萬福君五人官將百二十人主辟斥故氣精祟呪詛媚固使却死來生却禍來福重請大星君五人官將百二十人治石仙宫主制百姓口舌讒謗不行收正其位令百姓吏民相見笑喜重請祐護將軍萬福丈人官將百二十人主營衛某身重請青蒼君官將百二十人治巨門宫厭官怨讎刑禍之氣止之不到願上請天官時君將吏一合同時來下某州郡縣鄉里舍各隨所主擁護某身辟斥邪精瘟毒疫癘之氣謀議媚固皆令消滅使某心開意悟五神聰了所言者當所作者允如千百口皆為伏諾藴積唯新闔門平安嵗終舉善公私隆利以為效信當為時君將吏言功舉遷以報勞苦肉人大小千罪萬過並乞原赦恩惟太上衆真分别保護戎征章具法位上言謹按文書某列素以胎生肉人下官子孫連㑹有幸遭逢大化被受恩覆誠用欣慰但以頑愚罪過山積常招禍祟云云道里長逺行經江山歷涉淮泗方向凶敵白刃之中鋒毒既交酷加文武又軍法嚴峻動有梟戮妨惡持權脅人為暴肉人功簿無以禳災恐某當此厄難不能度脫元元之情慿恃道氣詣治告臣求乞祐護謹為伏地拜章一通上請東方九夷君南方八蠻君西方六戎君北方五狄君各十二人重請千里君萬里將軍祐護將軍共營衛某身隨逐覆蓋所在之處常今安穩辟斥衆災疫癘鬼賊使某白刃不加度脫厄難官中清利無他譴負以為效信當為時君將吏言功報勞恩惟太上衆真分别求哀赤松子章曆卷之六
