front:
  text: 赤松子章曆卷之三豈三
  hash: sha256:75d81ed607104b83f1ad7d9abcd2f7290a7a03f4739093dd933ea460cd604990
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0320_HFL_003-001a, image: hfl/0335/0335-120.png}
body:
  text: 天旱章具法位上言謹按文書某以下愚遭逢道會得覩聖世因緣幸遇染在大法伏蒙太上廣覆師君矜愍功無絲髮夙夜憂惶如履冰谷無以上答天地之恩臣受法之日約當虔奉師門布散道德助國扶命拯拔一切救物為先自頃巳來天地運否隂陽相刑四時失度國境亢旱禾稼不登慮以祅災競起純陽在上凝隂在下二氣不交玄澤不降旱風烈日萬姓熬然稼穡焦枯涸魚懼日良由帝王受天禪祚君臨萬邦三才台輔伯牧股肱宰長首吏等不能俯仰理物治功不逮臣某等受道重任宣化無方不能理正允中調和氣序致使五行失度天災所衝伏尋科法道氣廣覆洽潤生靈臣某伏聞乾知泰始坤作成物天地交泰而品物咸亨春生夏長秋收冬藏隂陽和順草木滋榮五榖成熟太隂主雨立春之日男以農種女以桑麻冀以秋冬得資賦稅承天受地品類以生立春二月始種五穀雨水和均五穀以益和氣蓄結某時炎旱若干日甘雨不降陽氣興盛天無行雲之廕地無津液之潤臣竊不自揆謹依天師科法觸冒湯火謹以上聞誠惶誠恐頓首死罪伏願太上無極大道三師君夫人好生惡死特垂大道之化願上官典者為分别五行驅處律吕羅列八卦標明節月使陽不侵境隂不退度五來鎮一水自潤下五來升二火自炎上五來乘三木自曲直五來除四金結從革五來自偶法滋稼穡須五而成而無不生然後使鶉火收熖玄枵吐津箕宿傾舌畢宿動根五嶽粗石四瀆騰泉伏乞天恩哀愍謹請靈臺宫中漢明君各一人官將百二十人主攝天雷等元名宫中小玄明君一人官將百二十人主攝河伯吕公子三十六水帝十二溪女九江水帝河平侯掾吏中部水神興雲下雨河天宫中九海北玄君一人官將百二十人主下水氣出風雷太山宫中泗州九谷君官將百二十人主起水氣又請泗州九海君水帝又請浮雲使者等官將百一十人一合來下與某州縣邑下地主明大社神名山大澤源谷山川之靈古今卿士大夫有功於民以配廟食者及諸村鄉亭里域真官注氣營傳符廟司舍一切諸神君降下同心盡力輔助天道以行神靈興雲降雨洪澤沛濡旱苗蒙膏潤之榮萬民有來蘇之命功成事立言功舉遷風伯雨師亦同升三天預酬勞苦願天曹告下速使旱魃之鬼應章消滅特從太上三師乞丐應驗不負效信恩惟太上分别哀臣愚劣謹因二官直使正一功曹左右官使者隂陽神訣吏科車赤符吏剛風騎置驛馬上章吏官各二人出操臣某謹為某等天氣旱燥恐百榖失收拜上請天官以時降下潤澤流注寶章一通上詣三天曹伏須告報臣某誠惶誠恐稽首載拜以聞請雨得水過止雨章具法位上言謹按文書某遭值運會得承師道助國扶命頃以寒暑不節祅蠥滋生𥘉陽以來亢早無雨人失農務禾稼萎枯臣謹為百姓寒心請乞披雲降雨洪澤四注隂氣遍降遂爾不息霖雨浩衍百川滂溢萬姓廢業田苗蕩沒朝野憂難請臣謹依舊儀貢章上聞願乞遷逹臣前所咨告雨泉官並還天曹中官録署進受功賞重請天公正氣君一人官將百二十人河上玉女千二百人各一合下上請天曹止雨移風風伯雨師依四時八節無令越錯收雲斂翳三光麗景當為止雨諸官言功報賞以為效信恩惟太上分别求哀操臣謹為請雨蒙荷上恩今乞停止拜章一通上詣某曹伏須告報臣誠惶誠恐稽首載拜以聞却蟲蝗鼠災食苗章具法位上言謹按文書某日載幸遇得奉清化某以多招災咎比年田種每不如意今年於某處野穗種植災蝗所食不可禁止向臣求乞禳辟謹為伏地拜章上聞願請北門宫中天田君一人官將百二十人主為某家辟除災蝗蟲鼠傷犯苗稼者一切蟲鼠為害皆令消滅重請地盡宫中天野君官將百二十人下利田作今獐鹿百鳥蟲鼠不得傷害重請三氣陽元君官將百二十人治黃雲宫中主收鳥獸傷暴榖稼之精不得為害虛皇大道勑所在土地山林孟長十二溪女社稷邑君令某田收倍獲無復災損如願之日不負效信恩惟太上分别云云謹為某日拜奏上請天官今春田作蝗蟲鼠災委恃道氣令得防護寶章一通上奏三天曹伏須告報臣等誠惶誠恐稽首載拜以聞收鼠災章具法位上言謹按文書臣某并弟子素以草苗子孫田作為業千載有幸得奉大道賜佩重籙顯加治職天官吏兵以自營衛罪積山海功無絲髮上答天地不敢自寧某處田作橫被鼠災傷損非可禁止臣不勝所見謹為伏地拜章一通上聞特從無上大道諸君丈人三師君夫人上官典者垂恩省察謹上請三五陽元君官將百二十人治黃雲宫中重請南山白虎將軍吏兵一合來下收捕境內羣鼠今還曠野有穀之地不得停住界內某鄉里土地山林孟長十二溪女社稷色君同為收絶鼠耗以時靜滅使五榖豐登百姓蘇悅以荷大道生育之恩不負效信恩惟太上分别云云收除虎災章具法位上言謹按文書某素以胎生下官子孫千載幸會遭逢大化被受厚恩夙承師道賜某天師符籙以自營衛寵光重沓實為過泰屬以時遇凶災虎狼入境餐食生人傷害六畜日月滋深無由禁止唯恐某家男女年命衰厄羅網縈纏觸犯衆禁太嵗將軍行年本命十二禁忌尸故氣飲食之鬼山精海靈百二十精魅及太古已來顚倒將軍道上將軍各稱官號與五方神傷當路神傷並乞不為患害某上請北玄君一人官將百二十人治黑治官重請北平護都君官將百二十人治赤治官一合來下與禁斷所居里域真官注氣監察考召山川社稷土地之主同心共意禳却虎狼之害重請伏行宫中百精君一人官將百二十人一合來下主收衆老百氣之精與人作祅害者重請制地君一人官將百二十人天中督御河伯水帝十二書事主收捕五方虎狼傷殺萬物百二十傷注腥血之鬼斷絶中外死亡傷注之氣重請九夷八蠻六戎五狄三𥘿君各隨方位春夏秋冬與某家宅三將軍二十四吏兵士三十萬人勤加營護一切衆生並令掃蕩願州縣某家男女大小牛馬六畜行來出入不逢虎狼衆災之難毒害不過此境並蒙全祐將軍吏兵效力之官言功報勞不負效信恩惟太上分别云云謹為某驅逐凶獸拜章一通上詣某曹云云解呪詛章具法位上言謹按文書某即曰口辭自列千載幸會得奉大道但以愚鄙信向多違招延考氣比者居止輱軻夢想紛紜怪異妄生祅祥屢起四攴沈重顔色痿悴精神浮散不附身形占筮推求云有惡人更相厭禱牽引天地指鬼呼神呪詛百端或題刻姓名或畫作形影或以刀剌心或割髮截指將告神社恐有百盟之鬼所見拘執莫知何功可以解釋防保身命唯用丹心特齎儀信上憑大道告訴向臣求乞章奏翻解呪詛謹為伏地拜章上聞天曹伏願太上老君太上丈人三師君夫人門下典者垂神省理檢勑若是春三月寅卯辰呪詛厭禱某身上請東方九夷甲乙君為某翻而解之若是夏三月巳午未呪詛厭禱某身者上請南方八蠻丙丁君翻而解之若是秋三月申酉戍呪詛厭禱某身者上請西方六戎庚辛君翻而解之若是冬三月亥子丑呪詛厭禱某身者上請北方五狄壬癸君翻而解之若是四季之月呪詛厭禱某身者願中央三秦戊已君消而解之或二十八宿呪詛厭禱者願隨方星宿君翻而解之或被惡人畫作形像及刀剌心或道上神社壇場牢獄樹木神靈井竈之中或與河伯水官俗中邪師私有鬼神之處伏以太上清髙三天遐邈正氣悠逺邪氣縱橫枉害良民遭者非一某橫罹無辜深恐一旦奄沒鬼官乞丐太上大道太上老君太上丈人天師女師三師君夫人門下典者五氣真君留神省念或犯五盟七呪之罪伏請太元兵士百萬衆又請翻倒君兵士十萬人一合下為某放遣三魂七魄不得留執還魂制魄平和神氣分解身中千邪萬鬼永不千亂一切邪神呪詛悉乞消蕩所請天官依臣言功遷舉請住宅至以為效信恩惟太上分别云云消怪章具法位上言謹按文書某即日口辭自列素以胎生下官子孫千載有幸得奉大道從來蒙恩誠實罔極但某比者宅舍不安邪神擾動所向不吉凶災數見以今某日忽見某色之怪開書列字憂慮非一求乞消蕩百怪章一通伏乞上逹三天曹謹為弟子某家推尋怪兆理合申謄依法齎芒繩一百二十尺刀一口及五方鎮信錢米命素等物為拜上五方大消怪章一通願太上無極大道三師衆聖曲垂恩眄𥨸以東方青怪自稱歲星妄作祅怪老木之精動作青物多所中傷乞東方青帝消滅怪殃南方赤怪自稱熒惑動作赤物欲來所害願南方赤帝消滅怪殃西方白怪自稱太白動作白物專為凶逆妄為怪異乞西方白帝消滅怪殃北方黑怪自稱辰星發泉源龜鱉之精動作黑物轉易姓名乞北方黑帝消滅怪形中央黃怪自稱鎮星動作黃物託號家親招集不徉互作怪異乞中央黃帝除滅怪殃謹按天師千二百官章表録上請天昌君黃衣兵士十萬人督御君兵士百萬人又請無上元士君五人各官將百二十人下為某家收捕百二十殃怪一時掃蕩消而滅之衆老之精前後愆咎乞垂原赦所請天官依三會言功不負效信恩惟太上分别云云為某去某月日見怪今求乞天官五方大消怪章一通上詣某曹云云禳災却禍延平拔命却殺都章具法位上言謹按文書某即日口辭自列云素以胎生下官子孫千載有幸得奉大道從來蒙恩但某入今歲之中推算年命災厄多端無福自輔唯憑一心求乞章奏以救拔身得遂安居伏乞三景真官切為分解年中天羅地網遊城赤鼠三丘五墓刑殺吟辰俱欲為禍願回保扶身命延益年算消災度厄謹為拜保護章一通上聞天曹宫官屬布散道氣流潤弟子某身中上請太和真一好生君五人運氣君五人解刑度厄君五人延命益算君五人請命保生君五人太皇萬福丈人宫中天昌君黃衣兵士十萬人又請收刑却殺君斬刑絶殺君執刑收殺君各五人官將百二十人保佑弟子某身中百怪刑厄從一厄至于九厄之中皆令度脫却死來生消災散禍回凶作吉次及劫殺災殺天殺地殺年殺月殺日殺時殺隂殺陽殺吟辰三殺五刑六畜欲為殃祟上請萬福君運氣君解厄君南上司命君太白明星君拘魂制魄君財庫君祿庫君定命玉曆君各五人官將百二十人為弟子某落除死簿注上生名今依玄科齎法信命素絹一匹錢一千二百文油一斗二升米一石二斗紙筆香果等獻上十方靈宫願為弟子辟斥邪魔養護身命天官聖母等普願特為利便又重請東方九夷君九九八十一官君寅卯辰甲乙君為弟子某解除東方青災青厄青瘟青毒青疰青殺又請南方八蠻君八八六十四官君巳午未丙丁君為弟子某解除南方赤災赤厄赤瘟赤毒赤疰赤殺又請西方六戎君六六三十六官君申酉戍庚辛君為弟子某解除西方白災白厄白瘟白毒白疰白殺又請北方五狄君五五二十五官君亥子丑壬癸君為弟子某解除北方黑災黑厄黑瘟黑毒黑疰黑殺又請中央三秦戊巳君千二百官君為弟子某解除中央黃災黃厄黃瘟黃毒黃疰黃殺并為辟斥五方黃病之鬼時行瘴癘水火之災皆令消滅及社里邑君同心併力加備守護弟子某家福祿日新公私清吉不負效信恩惟太上分别云云為某謹拜上却災拔命扶衰度厄章一通上詣某曹云云本命謝過口啓章具法位上言云云某素以胎生下官子孫千載運會得奉正一致屬道門遇蒙師老所見榮𩛙賜署符籙以自檢愼進參中乘荷佩契重蒙任治職奉道經寶過泰之恩實為罔極但臣某愚鈍神氣不平三魂不守七魄不寧誠惶誠恐稽首載拜皇上玉帝臣等七世巳來所行隂罪陽過積惡殺生之罪名奏三官乞今以去令臣某萬過消滅削除罪名邪氣殄散九福常寧七祖父母下及玄孫魂魄升遷反胎還嬰令臣某神