地境大將軍各收邪精故氣疫毒之鬼令病者痊復云云所請天官依三會言功遷賞不負效信恩惟太上分別云云疾病困重收滅災邪拔命保護章具法位上言云云緣身疾病困重告急於臣求乞章奏為某所犯罪結尤重依慿大道如蒙哀祐乞賜進算令疾病即日痊可謹請隂陽治病功曹五官醫吏詣鳳凰太宫日月之中請取太清五色神藥灌注口中流布百脈腹內胸膈之中痼疾皆能消愈木官持藥火官主灸金官持針水官主湯土官和劑各隨所使九竅相承五臟通暢六腑和調上請和考君太和君太陽君延壽君保命君度厄君五帝丈人都氣君又請髙麾大將軍返甲逆鱗兵士三十萬衆下為某身五臟六腑四肢關節十二宫室百二十關機伏乞併力掃除惡鬼或係綴某身者請告天地水三官五嶽四瀆山林孟長二十四禁忌並與臣身中所佩剛風赤天騎吏同共收捕惡鬼又願萬福君天倉君東方青氣君南方赤氣君西方白氣君北方黑氣君中央黃氣君各領兵士下為某身中驅遣邪氣乞蒙平復延續性命保守無他得如所願三會吉日言功舉遷不負效信恩惟太上分别云云為某身染重疾困頓在牀拜上拔命保護章一通上詣某曹云云扶衰度厄保護章具法位上言云云但某身沗承下官之胤因六氣以成形蓋萬劫之良緣沐三光之照曜處非常之世得預人流以今年災厄深重日月長逺貞古難保伏聞大道含澤拯拔黎民使枯骨重榮回骸起死某沐此大恩甚為無量或恐厄在東方天獄之中者請東方青帝甲乙九夷君從官九九八十一官君乘青龍飛行萬里持節執符主為某解東方青災青厄青瘟青凶青毒春三月災禍之氣悉為蕩除若厄在南方天獄之中者諸南方赤帝丙丁八蠻君從官八八六十四官君乘赤龍飛行萬里持節執符主為某解除南方赤災赤厄赤瘟赤凶赤毒夏三月災禍之氣悉令蕩除若厄在西方天獄之中者請西方白帝庚辛六戎君從官六六三十六官君乘白龍飛行萬里持節執符主為某解除西方白災白厄白瘟白凶白毒秋三月災禍之氣悉令蕩除若厄在北方大獄之中者請北方黑帝壬癸五狄君從官五五二十五官君乘黑龍飛行萬里特節執符主為某解除北方黑災黑厄黑瘟黑凶黑毒冬三月災禍之氣悉令蕩除若厄在中央天獄之中者上請中央黃帝戊巳三秦君從官三三為九九千二百官君乘黃龍飛行萬里持節執符主為某解除中央黃災黃厄黃瘟黃凶黃毒解除某身中從一厄至于九厄八難並乞消除又請皇天上帝日月五星五帝王相華蓋北斗君三天却録司命君一合下為某解除三災九厄并解今年瘟黃瘴氣悉皆逺離身心即日奉齎儀信白素絹一匹命米一石二斗鎮錢一千二百文油一十二升香燈紙筆等以為效信表質丹誠上請太上三天解死籍上生名削除萬病之厄家口平安道力扶助職祿永遷蒙恩之日所請天官吏兵依臣三會吉日言功不負效信恩惟太上云云拜上天官扶衰度厄章一通上詣某曹云云謝土章具法位上言云云比者已來居宅不利招延災考某處宅中土精地靈更相追責不知修何功德防保家口唯用一心仰憑大道向臣求乞章奏上詣三天曹願上官主者以時平省謹為上請謝土君五人制地君五人解土君五人安土君五人定宅君五人各官將百二十人一合下為某家披謝五方五土衆神但某自從立此宅巳來新舊掘鑿移籬換柱造立屋舍起土興工平髙就低攺動門戶六甲禁忌瓦石萬靈沈尸伏藏銅鐵白土黑土黃土土皇土王土相土府將軍土公土下君侯二千石隂土陽土四時五行中央太皇宅前宅後宅左宅右五土神王中庭令長夾門大夫門丞戶尉井竈精靈青龍白虎朱雀玄武螣蛇伏龍太歲太隂太陽司命十二時辰將吏天剛太一勝先小吉傳送從魁河魁登明神后大吉功曹太衝拘刑破殺土中真靈四孟四仲四季子午卯酉天門地戶東方土神所犯解謝震宫南方土神所犯解謝離宫西方土神所犯解謝兊宫北方土神所犯解謝坎宫中央土神所犯解謝乾坤艮巽等宫並蒙放赦某守宅大神晏子大戴蓋屋三重繞舍三匝東西南北邪精故氣及諸禍害一時消蕩乞某家大小永保元吉云云恩惟太上分别求哀云云起造宅舍以來觸犯宅神土公禁忌更相追責拜上天官搜謝解釋考氣乞恩口章一通上詣三天曹云云却虛耗鬼章具法位上言云云但某口舌橫生奴婢逃叛皆緣虛耗鬼魅相仍謹請五福天官地祇十二官將百二十人尋究此章奏上為某家收捕宅內五虛六耗之鬼各歸本方或青虛青耗之鬼遣歸東方青帝收而禁之勿令遊走或赤虛赤耗之鬼遣歸南方赤帝收而禁之勿令遊走或白虛白耗之鬼遣歸西方白帝收而禁之勿令遊走或黑虛黑耗之鬼遣歸北方黑帝收而禁之勿令遊走或黃虛黃耗之鬼遣歸中央黃帝收而禁之勿令遊走干擾人家所請天官兵吏及某家守宅三將軍等三十萬人同心併力為某馳遣宅中虛耗退散願某家資産業集聚回凶作吉田蠶萬倍牛犢盈欄金銀增積口舌潛消災厄不生所願皆成人口平康財食增長云云言功安宅章具法位上言某若干人住宅不安慮觸冥司招延考氣以今年運五毒流行中傷天民不擇良善蓋某以胎生無知下官子孫千載幸會得奉大道常懷恐懼無地自安頃者家口大小處在其中不自保持憂慮尤切為比年或有修輔掘鑿移籬換柱事非一條觸犯天禁地忌太陽太歲將軍神頭神足行年本命大虛小耗災殺劫殺勾陳白虎十二時神土靈土殺一切虛耗上下土官慮有觸犯致某家舍宇宅神不安井竈龍神之主不為利便願與某安穩宅舍遷逹各得安居謹按天師千二百官章上請卿邑大夫神君官將百二十人下為某家分解前後所犯禁忌並乞消除伏請制地君五人官將一百二十人為解太歲太隂太陽大將軍大小虛耗蠶室畜官上下禁忌之鬼一切並乞消滅謹請東方青帝九夷君南方赤帝八蠻君西方白帝六戎君北方黑帝五狄君中央黃帝三秦君四季五土更相分氣及四方官將並為某家宅中收除禁忌千精萬邪下官故氣歲月日時災殺破害之鬼一切消滅五帝安宅諸禍不生利祐一歲之中四時安穩八節無災二十四氣相應乾上廣覆坤下普載永享貞吉震生青龍治宅左離生赤龍治宅前兊生白龍治宅右坎生黑龍治宅後坤生黃龍鎮宅中央五龍治宅辟除不祥消滅凶惡掃蕩千殃神龍安鎮四鄰和睦攺逆從順除前愆成後善道氣流行宅舍清吉仕宦髙遷所求如意從心之日不負效信恩惟太上分别求哀云云為某家恐居宅不安龍神不利禁忌撓動謹拜上上請天官將吏乞為收除鬼氣安慰冥司迎請五龍安宅保護人口乞恩寶章一通上詣某曹云云斷瘟毒疫章具法位上言云云即曰自列千載有幸得奉大道被蒙恩覆以自營衛但某百行多違招延者氣大小疾病日轉有增詣臣求乞章奏令瘟氣斷絶臣以暗昧不明鬼氣按天師千二百官章有下官故氣邪淫鬼賊周天市地妄生災禍尅害良民伏聞太上髙尊三天清遠宇宙廣大日月光明無所不照行邪之鬼並皆誅滅若是東方生青瘟青毒青疰鬼名髙逺在南方生赤瘟赤毒赤疰鬼名士言在西方生白瘟白毒白疰鬼名白幸在北方生黑瘟黑毒黑疰鬼名大黃奴父子七人男女兄弟各行惡毒疫氣正月至十二月各有瘟鬼隨其放逸天下病害又甲子乙丑寅卯辰巳午未申酉戍亥十二月辰瘟鬼皆有名字從十二時上來五方五色黃奴老蟲致今未世愚民逢禍致死不可稱計臣受法之日約當助國扶命醫治百姓按如科文誅滅邪偽掃除逆鬼皆令滅絶臣備受治職謹當伏地拜章上聞太上無極大道諸君丈人鴻恩覆護某家悉與掃蕩羣精滅絶惡鬼根本上官使者時蒙斷省願東方主斗成主絶青瘟南方主斗平主絶赤瘟西方主斗遷主絶白瘟北方主斗長主絶黑瘟中央主五父君主絶黃瘟東西南北四維上下十二時神並令營衛惡鬼無令放入又東方青帝南方赤帝西方白帝北方黑帝四方一時同臨祐助上請髙天萬丈百鬼中王萬二千人兵士各八十萬衆與臣身中吏兵及守宅三將軍二十四吏兵士三十萬人併刀同心蓋屋三重繞宅二匝兵刃向外一時掃蕩凶逆邪精並令消滅所請天官言功報勞不負效信恩惟太上分别云云為某家拜請天官乞恩防斷疾病并鄰里疾病請五方天官收捕五瘟疫癘鬼賊章一通上詣三天曹云云赤松子章曆卷之三
